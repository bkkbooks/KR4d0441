孫贈羽人白髮倦巾櫛客來無禮容愛山思疊石辟穀學餐松林靜分朝磬雲深隱暮鐘桃源在何許我欲問仙蹤送彥上人歸霅川苕水來天目春深應更清獨行山徑裏到處杜鵑聲亂草侵衣緑殘陽隔樹明何當縛茅舍遁迹度餘生無照約余過雙峨首寄以詩遂次其韻答之相將峨石下緩步復吟哦古壁畫龍象隂窗蔓薜蘿樹枯生意盡僧老道心多獨有余兼爾時時得共過間居掩室依城曲身間足自寬地經梅雨潤天近麥秋寒金石琴中奏雲山畫裏看如何瀛海內塵土日漫漫山中秋夜寂寞空山夜徘徊何所從穿雲扶瘦竹待月倚長松雨過澗聲急林深秋氣濃孤吟猶未穩牧笛起前峯懷南逰者忽憶南征侣迢迢荆楚間江城羣木落笻杖幾時還嵗晚心空切鄉遙夢自間名山知歷遍終老別離顔人有與余有西湖之約者久而不報因以二詩促之佳期曽不逺幽事試先論既踏蘇堤月還看越嶠雲春船應共載夜榻可同分行李須當戒緘辭報爾聞久有西湖約不知能去不一身成老大兩地憶交逰野岸春姿動江橋霽色浮此行如可共毋惜榜蘭舟人日舟中客裏逢人日如何天亦陰舟行還慮雨夜宿莫沾襟野水來赤岸春風過皂林清逰本無悶覔句強勞心雨夜宿崇德南柵落日天涯雨修程那可登水邊聞擊柝木末見懸燈夕吹狂還歇春雲亂欲崩船窗作弓卧我亦竟何曽臨平道中聞説臨平路扁舟此度過旅情隨水逺詩思見山多湖外無青草村邊有白鵝濛濛煙雨裏敧枕聽吳歌錢唐客夜旅寓困風雪愁心那可降夕寒傷短夢病骨怯髙窗古柳依荒苑疏鐘徹舊江不眠歸思動無語對蘭缸陪山村先生白提舉宅清集展席當清晝馮軒野思饒苔隨屐齒陷雪入酒杯消看竹鶴先舞彈琴梅自飄風流餘二老相對話前朝過西湖小艇泝深碧悠悠返照間柳邊逢白鳥湖外見青山寺隔春城逺雪隨野水間不知林處士幾度此中還逰龍井江郊雨初霽野興入孤笻白道行時盡青山到處逢寒泉鳴逺澗旭日照髙松隂井空猶在如何不見龍冷泉亭一脈雲移出流來萬古長冷涵芳樹緑幽帶落花香馬迹喧春晝猿聲吊夕陽不知逰此者誰解辨滄浪送界上人還錢唐春風吹柳條送別欲魂消花發清明近人行緑水遙猿聲靈竺雨帆影浙江潮却憶同逰處笙歌滿六橋偶成院落清陰合微風燕子過好花隨雨盡惡草入春多聲利青雲上空間碧澗阿百年渾是夢身世欲如何路出門皆可適何事獨興哀固是分邪正爭知絶去來雲霄還直上榛棘且低回又道長安市風埃聚作堆除夕次韻山村先生二首逗曉嵗方盡爭知春已還菜青憐客饋髭白笑人刪陶陸雖歸社巢由豈買山平生攻苦意不是學疏頑夜寒還附火齒冷必依脣鏡裏千莖雪城中數日春驅儺堪嚇鬼爆竹莫驚人與世誠迂濶餘生但任真清明山行次韻灌木莫鴉繁逰人取次還清泉煮茗掬髙竹挂衣攀雲葉墮平地松濤起半山塵埃日擾擾浮世有誰間無照西園㕓井希間地名園到此深穿池侔野水種樹學山林菊圃入秋色檜屏生晚隂悠然淡相對物我兩無心郊行次韻秋雨灑郊坰離離禾黍情見山銷客思問路憶鄉城鳥沒江天濶魚沈野水清不知來往者白首竟何成秋思二首林間香火暇每復事詩書伏櫪終憐馬臨淵不羡魚殘陽雲木淡朗月水天虛徑靜無來客蟲鳴秋草疏蔬食聊存拙幽棲獨固窮城鴉歸晚色庭樹入秋風詩思塵埃外間心澗壑中弋人空佇立無路問冥鴻幽居林間常獨掩深徑更多苔坡暖草爭出山寒雲未開澗花空自落溪鳥靜還來莫待重陽至先尋菊本栽齋居次韻蕭齋掩深晝四坐淨無埃汲井青衣出烹茶白足來瓦爐連佛燭㨑拂近香臺隱計還應遂山圗莫浪開秋懷十首涼風動寥廓庭下草初黃病骨知寒早愁懷覺夜長孤城淹嵗月重露迫衣裳黑髮渾無幾尤宜事退藏茶香醒午夢爐篆散窗風淮北傷秋水江南見蚤鴻暢懷非麯蘖遣興有絲桐久雨晴何日青山杳靄中江城暗塵土鐘鼓自林泉老至雖多懶身間似往年迎寒營紙閣趁暖玩韋編亦有煙波興凄涼無釣船抆淚哀吾道傷心憶故園孤窮時易失老大我猶存日薄雲凝野秋聲葉滿門澗阿雖自樂寤寐獨無言思苦心益苦冥搜我獨知木雞終解語畫餅豈充飢聽雨卧秋榻觀魚繞石池間中書可讀出户亦遲遲顧景每獨笑無營秖賦詩心勞頭白早秋晚葉黃遲冷坐倦來客溫尋愧古師雙雙階下蝶香醉菊花枝砌冷候蟲急燈昏幽夢長秋風吹草木天氣入凄涼門掩荒城月鴉啼古堞霜無成今白首身世轉堪傷駸駸巳遲莫吾道入衰微浮俗惟鮮食空門自衲衣邊鴻先社至蒲柳望秋飛坐對中宵月寥寥何所依澗曲獨盤旋人間事屢遷艱難銷壯志衰朽惜殘年世有還珠浦生無種玉田歸來華表鶴亦勸學金仙抱景坐虛室翛然誰與同像金輝夕燭櫩鐵響天風汛大潮應滿林深葉未空江南秋欲老腸斷北來鴻野菊野菊隱寒草秋來花自芳凄涼逢莫雨浩蕩憶重陽五柳辭榮久三閭別恨長東籬無夢到珍重付啼螿山居二首結茅鄰虎豹食麵度朝昏衆水自歸壑一峯常對門秋河明樹頂隂澗響雲根樵獵徒瞻望煙蘿莫可捫钁頭雖柄短深谷可開畬掃葉林風急擔泉野日斜髮長寒不剃帽破裹堪遮猶憶來居此因循嵗月賒田家秋晚豈宜雨田家但愛晴辛勤事東作日夕望西成社酒兼兒醉新炊滿屋馨紛紛理禾黍不覺曙鴉鳴書卧雲室名遂身還退優逰足卧雲市聲深巷隔塵迹斷河分竹露晴猶滴荷香靜始聞齋餘無一事間讀古人文曉思雞聲鳴不住花漏滴初沈殘月依松牖新寒到楮衾燕歸秋亦老霜降水猶深欲識栖間意牀頭有緑琴辛酉嵗莫嵗晏雪未落雲深山易昏雨聲浮几席野色隱蓬門芳信傳梅蕊春心託草根平生獨居意俯仰有乾坤破山興福寺用唐常建韻高僧曽駐錫壞塔寄中林不是禪門靜爭知塵海深潭空龍出穴巖古樹無心何處來黃鳥嚶嚶送好音瑞石為祥付偶然但欲保貞堅自是堪攻玉誰論可補天幾年遺絶頂終日並清泉頑鈍無由化逰人莫浪傳聚逺亭頂山中峯院舊有此亭宋邑宰劉拯嘗留題處士林逋亦嘗和之石刻具存亭則墮已久矣余假林韻為詩一首以寫山中之勝時壬戌莫春之三月也泉流嶺下分濺沫濕晴雲野月當空照松風徹夜聞碑殘因蘚駁像暗為燈熏秪隔簷前竹甡甡見鹿羣龍君祠曽聞移夜冢來此寄煙霞遺構空山裏長藤挂樹斜池幽涵石髮風暗積松花旱潦堪祠禱衣冠莫憚賒永昌道中孤舟遡晚風久客倦西東野岸敧頽石窑煙散逺空路長驚落日春盡惜歸鴻漸喜城門近市樓燈已紅秋思掩關期養素荏苒老江濵城晚鴉歸堞天寒貓近人斷煙浮野水涼颸起汀薲矯首雲中雁隨陽又作賔寄題昆山慧聚寺用唐孟東野張承吉韻二首旭日上絶巘宿雲猶滿牀嵓溜滴靈草天風飄異香隂井浮海氣野竹搖山光幽尋殊未罷遙想煙霞場山深嵐氣昏江逺莫樓吞片月生松頂孤泉出石根歸牛分牧笛落雁隔漁村嚮老遺蹤在清風滿竹門送東山長老逰冷泉江天巳遲莫挈襆上行舟老大懷新感煙霞訪舊逰月明山館靜泉響野亭幽覔句應心苦何人共倚樓晚晴臘殘芳事近雪意已成空逺岫潭潭碧微陽淡淡紅園蔬抽宿雨院柳變春風間倚闌干曲凄涼見斷鴻送虞待制歸江西還翰苑今代詞人手輸公獨邁倫見髙忘勢位思壯足精神雪浪西江水煙花上苑春只應清夜月處處照車輪雨中次韻春霖不肯住白日隱煙霏暝薄窗間紙嵐蒸架上衣荒園梅子小幽圃芥臺肥牢落江城外東風雁北歸納涼日夕倦煩暑虛廊獨坐時風蟬聲斷續月樹影參差菰米先秋熟荷花失雨遲會當臨滉漾倚杖濯鬚眉送人赴三高祠主奉笠澤光猶逺餘輝及後人諸孫奉祠事千載繼芳塵釣艇煙波濶江橋棟宇新聖明今在上此去莫垂綸西齋聽雨雨聲來不斷故故並西齋事往添幽夢年衰減壯懷潦深猶有路草長欲無階想得南薰至還應天氣佳再用前韻酬無功出門何所適清坐掩蕭齋圗史有真味塵埃無好懷蛛絲連逺樹蝸篆滿空階擬共烹新茗井渾泉未佳錢唐感舊江山王氣終江水自流東鐘鼓傳新寺煙花失故宫龍亡靈沼竭鳯去寢園空殘月西風夜無人倚井桐秋日次韻楚人悲落木魏客賦登樓何事東西路能生今古愁月涼青樹曉水冷白薲秋拄杖猶懸壁無心作逺逰舟次吳江客路渺無際崎嶇何日平積煙迷逺樹殘照下荒城水宿先歸港朝行暗計程長橋知漸近笳鼓隔林鳴次韻答宋子虛茫茫萬人海跂望渺難馮從作山中相爭如林下僧艱難心轉小老大氣偏增只有間為貴浮生幾箇能九日老至逢佳節何心惜嵗華白衣千載酒黃菊九秋花養素人情淡居間世路賒午窗書梵典風裊篆煙斜秋莫冉冉秋光莫悠悠蛬韻悲青山無變色黑髮獨成絲亂葉多萱草髙花半菊枝寂寥塵境外間誦考槃詩感古壟畝非朝市求賢豈易逢饁田知郤缺辟雨見茅容泗水雉為蜃禹門魚化龍幾多髙蹈者樵牧老雲峯曉思畫角吹霜月孤城寒氣增風聲窗外竹夜景佛前燈委貨懷貞士遺榮尚靜僧西山泉石好早晚去扶藤借韻酬無功窮通皆有命孰肯強求知舉世思趨利何人聽説詩雲間依碧嶂魚樂繞清池更欲投深密誅茅計己遲送薛安道赴雲陽尉天佑家世簪纓後為官豈為貧有才終濟世得邑且臨民雞犬通宵寂弓刀列户新公餘定多暇詩酒可怡神過故人所居㕓中成小隱幽户晝常開好畫多同看新詩每獨裁湘花香帶露渭竹影侵苔二子丹青妙時聞車馬來福嚴即事次韻城郭繁人事深栖足離羣聽泉因坐石看竹得穿雲簾卷山還入池成路自分梅花香欲老蜂蝶未曽聞悼幻住和尚聲名喧宇宙生死一蘿庵既是藏陶器終非火木龕門風宏濟北塔樣劣湘南珍重諸龍象從兹政好參癸亥嵗莫孤城臘欲殘卷地北風寒雨竭河流淺霜餘木葉乾半生惟斂退萬事但從寬與俗誠乖異無求足自安春日雜興三首力疾坐圓蒲清香炷瓦爐春寒欺鶴骨古雪壓犀顱水暖龜魚樂泥融草木蘇驅馳漫勞苦莫廢靜工夫陶令官彭澤旋聞炊黍香功名比雞肋世路劇羊腸桑海雖新變琴尊只舊忙終期隨化盡松菊老潯陽山中三十年枕石抱雲眠南嶽煨黃獨東林種白蓮碗香供茗飲簾暖護柴煙俯仰人間世清風有昔賢真柑黃柑出洞天珍貴古今傳入手香三日辭枝顆百錢品髙陵蜀産味勝壓華筵釀作王孫酒堪詒玉局仙冬日漫成二首一日又一日今吾非故吾月明知顯晦葉落見榮枯道在山林重名浮宇宙孤世情無定向屋上但瞻烏年光己頽莫笑口向誰開寒氣三冬盡春陽九地回窺園逢白草散策得江梅矯首成遐眺風前朔雁來春日即事古木寒風動重城莫色催間居逢月閏老至見春回凍地餘青草溫爐有白灰一燈懸丈室半照落瓶梅感懷世事浮雲變時時到眼新雨寒思附火年老畏逢春草長通幽夢波流失故人弟兄南北久寂寞斷音塵逰靈巖用唐趙嘏韻入門松路悄村逺隔滄洲山寺方槐夏田家政麥秋屧廊聲久寂香徑水空流落日催歸棹無因更上樓寄雲陽薛縣尉聞説雲陽尉官間不廢吟夜村無吠犬春館有鳴琴古甸蒼山迥長江白浪深金焦舊遊處何日共登臨暮春故人書樓清集晚興生遐眺層隂起逺空巷分鄰樹緑山映寺樓紅倚檻對清雨卷簾來好風非君有幽致勝集豈能同初夏偶成春去衆芳歇緑隂生晝寒輕飆起薲末細雨來林端水縮舟楫隘心間天地寬驅馳徇物者白首無由安盆竹瓦缶不多土娟娟枝葉蕃豈知么鳯尾元是古龍孫蒼雪灑禪榻細香浮酒尊王猷來此見應亦為銷魂一乘菴結屋依髙巘雲峯隔水西山空秋氣早天濶夕陽低柳下見漁艇窗間聞午雞長年抱禪寂不是學夷齊晚興雷聲開蟄户電影繞窗扉雨暗空雲作林喧宿鳥歸小橋春水漲深徑莫花飛别有幽期在山中筍蕨肥茶屋清心修茗事淨室掩春風瓶㵼嵓泉碧童敲石火紅杯鐺今陸羽文字老盧同俗客何由至塵埃路不通吳山晚步二首雨晴山色正晚步興何長野寺依嵓靜流泉出澗忙路幽宜杖履樹密礙衣裳此日逢朱夏臨風蕙草香平生愛丘壑老不倦躋攀上國風塵暗中林嵗月間池清應可飲山好欲忘還道左何人冢麒麟臥草間雨入夏何多雨荒城日日隂桑麻村墅暗鵝鴨野塘深米貴防微賤霖淫恐大侵魚龍莫漫喜使者政勞心九日後作佳節名猶在寒花迹已陳黃壚存朽骨白髮及間人秋色無多日茅簷別有春浮生竟何事應俗漫勞神聞鐘天空羣動息逸響自虛徐擊處令生滅聞中謝有無春船驚夢客曙堞起啼烏常記秋山聽松櫩片月孤雨後暑雨欣初霽孤城水渺漫聞吟清晝永靜立緑隂寒巷僻無車馬庭幽足蕙蘭平生守疏拙不是強求安秋夕欲雨竟不雨雲凝河漢濵砌蛩幽破夢窗月靜窺人火逐炎光老詩隨涼颸新賔鴻猶未至砧杵滿遙鄰秋日過如鏡師房二首嵓房秋氣清相過話間情檻外葉初落窗間琴自鳴昏鴉歸逺樹野水繞荒城三十年來往于今白髮生聚首洽清歡分違良獨難情深劣雞黍義重劇金蘭小圃草猶碧中林楓已丹非君愛樗散那得此盤桓咏塵棼棼仍擾擾今古困征夫衣上有時盡寰中何處無荒祠凝靜几間市衮長衢漫説飛滄海誰能見海枯寶帶橋運得它山石還將石作梁直從隄上去橫跨水中央白鷺下秋色蒼龍浮夕陽濤聲當夜起併入榜歌長淵明圖身捐簪組纍藜杖得間行耕鑿還初服琴尊了此生孤吟忘富貴長揖謝公卿無酒堪招隱空懸萬古情送白無咎入蘭陵幕府獨賢勤典教中嵗始臨民幕佐紅蓮舊袍分緑草新琴髙終絶俗畫妙定通神公退應多暇甘柔好奉親松下談玄畫軸松頭風寂寞松下客淹留話到天人際能令神鬼愁碗香溪茗熟嵓響野泉流老怯攀躋倦晴窗得臥遊次韻答范秀才見寄握别遽經嵗難忘故舊情夜堂幽夢逺寒杵莫秋清月照紙窗白露垂楓葉明無心甘擁篲但欲與鷗盟感懷二首齒髮颯巳暮空懷少壯心夔龍既廊廟巢許自山林夜雨梧桐落秋風蟋蟀吟時方劣恩信無術化黃金人生駒過隙好息漢隂機但識刀錐是爭知土木非田園猶換主日月豈停飛久欲攜瓶錫誅茆入翠微丁卯閏九月九日作三年逢一閏此嵗兩重陽白髮多新感黃花只舊香陶潛悲世短寧戚慨宵長閭里欣佳節招邀共舉觴次韻酬子虛二首聞君久學仙投老擬參禪林下堪休影區中且任緣染髭瓢有藥潄齒井無泉天旱故也幾換珠輪線窗間手自穿散策過僧家天寒烏帽遮宦情間去盡詩思老來加雪作空中片雲生石上芽風流自來往塵迹到應賖懷陳道士次韻前人乾坤真逆旅乍合首還分形迹成拘滯音塵隔見聞簫聲猶在耳鶴影獨離雲汗漫來何日無因睹近文早春次韻幽栖愜野情老至倦春行雪盡終無冷隂多未得晴砌香梅墮片空響雁傳聲愛爾登臨句身間思致清次韻還舊居陶公返舊居尼父賦歸歟嵗月注坡馬丘園下澤車蝸涎存古壁鼠穴帶殘書為得玄中趣東西總宴如嵗莫書懷次韻無功二首烏兔無情極東西來往頻風霜寒永夜城郭老間身井旱泉源竭冬暄草色新不須論往事斂迹作幽人嵓壑歸何日中宵入夢頻生無趨俗韻老有背時身蘭葉侵衣緑梅花到眼新寄言㕓市客不是卧龍人憶清泰花上已標名資糧願早成定應生樂國斷不墮疑城妙法水禽演圓音風樹鳴慈容彈指對永劫破無明谷響集卷一
