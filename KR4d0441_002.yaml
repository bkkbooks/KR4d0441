body:
  text: 谷響集巻二元釋善住撰七言律詩春杪登蘇臺獨上髙臺小凭闌荒城寂歴水雲寛連天芳草雨初霽滿地落花春又殘白髮不生還亦老青山無事且須看呉王伯業消磨盡江鳥呼風野樹寒秋江晚歸圖誰驅象管掃風烟野老攜笻古木邊山靄沈沈無過鳥江流泯泯有歸船家貧不畜栽花地力健還開種秫田辦得縣官秋賦足黄鷄白酒樂豐年答人問次韻昔年曽事華陽君寵辱昇沈總不聞雞犬得仙何足問刀圭餘藥可同分丘園自洽唐虞化枕席猶觀屈宋文門外輪蹏互馳突矮窻終日㫁囂氛秋居為愛吟詩心獨苦每於人事少闗情山林有道名還著㕓市無營跡自清黄葉蕭蕭孤館夢青燈耿耿百蟲聲一従栖息窮簷下包笠何曽浪出城送胡道士用唐賈島韻蘿逕春歸半是苔舊山無處不花開石房雲暖青牛卧琪樹月明黄鵠來萍㸃霞裾行雨罷血凝星劍斬蛟回篋中靈藥長存取莫使流年逝水催舟次盤門過無得院篷窻兀坐聴鳴蟬滿目隂雲欲雨天山隔壊城縣落日樹連荒驛帶蒼烟臨流石馬何年墓種竹人家有釣船至老相尋能㡬度更揮青葢訪林泉送無照入杭草白山青羣雁飛天寒日暮行人稀危㠶側倒過絶岸鉅浪突兀飜晴磯飛來峰頂猨聲急合磵橋邊月色㣲巳有梅花報春信地爐煨芋待君歸贈日本僧鯨波渺渺接遥空今古由來一葦通斗柄夜縣常辨比日輪朝湧始知東車書既混文無異爵服才分語不同鄉路眼中應已熟好攜包笠扣𤣥宗凌歊臺用許渾韻宋武南巡能㡬回如何此地有髙臺濛濛野翠連山合漠漠江雲度水來輦路春深芳草暗宫牆日暖碧桃開殘碑一片无人讀土蝕沙埋卧緑苔遣興鏡中嵗月髮如霜拗折漁竿罷釣璜成我固知無鮑叔絶交幸得有嵇康江邊茆屋従風巻峴首苔碑任雨荒一炷栴檀數聲磬青燈影裏事空王寄巖栖翁白首雲棲掩竹扉山中消息到城稀老來閒去交游少病後經行氣力㣲野岸曉烟添柳色敗垣春雨長苔衣吟詩只益丹心苦擬挈筠籠共采薇次韻送劉鍊師還茅山鶴背風髙歸路難故山遥憶水雲寒青琴三疊篴三弄白飯一盂蔬一柈對客圍棋衣緩帶斬妖揮劒髮衝冠壺中日月雖無限誰信人間鬢易乾悼陳隠君端淳耆舊凋零盡今日傷心又到君身後有詩傳異域生前無子托斯文閒門寂寂迷芳草古柳依依黯莫雲惆悵我來相吊罷庭花和淚落紛紛雅黔突蒼煙沐羽翰歸期頭白亦何難平疇亂落野風急髙樹争啼壠日殘闚食引吭行屋角避人飜影起江干因思水宿孤舟夜敧枕候鳴霜月寒故里感事墟落荒涼竹樹空耕飡鑿飲古今同一聲鴻雁度寒雨兩岸蒹葭鳴夜風耆老問來多作鬼故交别後盡成翁雲山滿目愁無極浩浩溪流只鄉東送日上人還呉淞秋雲秋水雨悠悠白首何堪動别愁岱嶺月明寒鴈過楚江木落晚禾收夫差既賜申胥劒句踐難回范蠡舟今古興亡無限事願因歸路問沙鷗遣興少年心事付東流把鏡空驚雪滿頭蠻觸戰争何足算雞蟲得失㡬時休清砧㪣碎呉臺月寒角吹殘越壘秋究竟自知身是客行蔵何必倚危樓九日澤國西風物候殊此生能見㡬榮枯漏天不與杜陵補濁酒誰資陶令沽眼對黄花聞蟋蟀首敧烏帽把茱萸年來巳減登臨興卧鄉松窻看畫圖送人還山茅茨抛在翠㣲間楖栗横肩又獨還松樹别來巢鶴大銅缾歸去蟄龍閒西風黄葉埋寒逕落日青猿叫亂山後夜月明誰是伴枕前飛瀑響潺潺寄無照雅道交游僅有君片雲遥隔㫁知聞燈前緑酒難同醉屋外黄柑可共分唐老詩瓢浮草具永師茟瓮瘞銘文滿懐風月還依舊好過街西與細論贈羽人霞珮星冠老葛洪何年飛下玉華宫石鑪香冷易初罷山鶴睡醒琴未終好道每思超物表愛閒長欲入壺中不知自别仙都後還見桃花㡬度紅送人入杭尋弟及謁山村先生之子難忘骨肉情逺尋仲弟入杭城好山半向舟中看佳句多於枕上成驛路牛羊歸暮色江橋鼓角動秋聲端淳耆舊今無㡬為問湖邊老浄名次韻奉酬嵓栖翁身世悠悠自可哀暫將懐抱鄉君開半生白雪無人聴㡬夜青山入夢來竹院就荒愁見草水田經廢怯聞雷攜笻便欲相尋去行到松隂却又回寄人二首先生五十已開秩我輩政在不惑年萍水相逢何太晚芸窻對坐成華顛支公自放沖霄鶴嚴子方規賣卜錢莫待池魚長頭角便隨風雨上青天落魄東西但任縁舊房抛擲已多年行蔵厭作出山草身世甘為上水船黄卷排籖常滿架緑琴挂壁久無絃不知入社將何日且要開池種白蓮與無照莫出西郊閶闔城邊烟草昬自攜禪侣過孤村隂雲垂地鳥歸樹寒色滿空人閉門山逕雨餘留虎跡野塘秋盡露潮痕一聲牧笛前峰起回首殘陽欲㫁䰟送松洲歸蘭陵衣嚢結罷上歸舟腸㫁江城雨不收年臈漸髙愁作客交朋雖好倦追遊水村逺近多鄉樹烟郭東西是别州此去故知南鴈盡相思能寄短書不過石湖十月呉皋霜露零田家收稻滿柴扄湖中浪擁銀花白天末山横螺髻青寒色亂雅飛笠澤夕陽衰柳並旗亭何時覔得清遊伴更買扁舟過洞庭宿山寺用唐項斯韻步入松門行逕㣲秋燈隠隠見僧稀風生闇壑虎初過雲起寒潭龍已歸桂檻清泉當面落穿廊黄葉近人飛明朝又鄉它山去身外還存舊衲衣遣興寳書空揜滿塵埃縱有閒情亦懶開壯志但隨白日過少年不逐青春回風波浮世誰長在雲雨交游我獨哀更欲荷鉏嵓壑去種松栽菊自裴回桃花源詩孤光耿耿洞門斜只尺仙源去不賖流水豈能迷客路春風終是到田家山林影裏聞人語鷄犬聲中得岸花相見毋煩問塵事且同尊酒醉煙霞懐北游者芳草長亭路渺澷逺遊聞説過淮安相逢每歎同懐少一去那知㑹面難老鶴唳空松院静夜燈照雨竹窻寒年來舊友皆流浪笑對青山獨倚䦨登報恩寺閣髙閣閒登四望寛青山極目倚雲端水村漠漠連天逺隴樹沈沈帶雨寒罷馬嘶風春艸徧倦雅歸堞夕陽殘豈知大道平如掌今古人間行路難書友人壁獨坐虛窻晝眼明萬縁休罷一身輕石池水滿魚苗長花逕雲消鶴影清燈下逺書來越嶠枕中孤夢出江城自言野性如黄鵠日夕長縣碧漢情警墯次韻少小林泉學空寂不覺犀顱生二毛買山無資愧支遁昇天有路付琴髙北上定愁燕地雪西游終怯瞿唐濤牀頭三篾幸無恙束肚何須紫錦絛寄無及長老清才雅望屬明時在處人傳絶妙詞静飲三杯松下酒閒圍一局竹間棋花開古寺春生蚤潮落寒塘月上遲莫訝近來音問缺為因無路寄相思寄如鏡師露滌暄風寒氣催砌蛬號冷夜聲哀楓飄南國鱸魚上鞠發東籬鴻雁來髙閣晚山曽共看舊房秋逕未重開何時再剪西窓燭坐聴青琴走壑雷送人之金陵歌罷陽闗酒一杯扁舟欲上更徘徊舒王舊宅為僧寺後主遺宫化刦灰北固山頭春雨過西津渡口莫潮回心閒在處堪為客遮莫天涯杜宇催松陵道中五兩翻風彩鷁浮旅情詩思共悠悠霜迷古道晴猶滑氷合平湖曉不流隠約野田明白鳥凄凉江柳暎紅樓故人只在炊煙外帶月侵星到即休傷報曉鷄畫角聲銷欲曙天逺傳清唱到窓前殘燈獨客回春夢壊榻閒僧起夜禪茅店霜寒登樹宿槿籬日暖踏花穿不知何處供盤箸空對筠籠為黯然悼畊雲禪師聞師久鄉峨隂住擬與將來建法幢半偈不留忙下世舊經空在伴秋窓雨荒新塔風吹草雲黯孤城月墮江行業未馮人紀述南宗弟子已心降靈嵓尋幽逺到千年寺行盡清隂見野桃羅綺成塵傷窈窕屬鏤凝血閔英豪雲生絶壁春山暗風起平湖夜浪髙暫向松根憩㣲倦滿身空翠濕征袍秋興青山木落見遥曽㡬欲依栖去未能鍾阜固應回俗駕沃洲終合屬閒僧柴門静掩深秋雨月色寒侵午夜燈不涉世縁尤是分風雲何必羨鯤鵬送别友人用唐姚合韻逺到山家學采芝情深不覺忘歸時松敧老屋侵人近石礙流泉出磵遲峯影參差連草色禽聲窈窕隔花枝莫言書劔曽來此恐落閒名四海知寄無照巾舄隨縁寓北山家林雖近亦忘還一簾草色清秋静四壁蟲聲白晝閒佳句但書幽石上逺峯多畫寝屏間嗟予與爾同年齒落魄無成鬢欲斑書如鏡師壁銅龜塔下居來久種鞠栽松老嵗華無事㡬曽離水石半生長是寄煙霞據梧静聴空堦雨策杖閒看小苑花多少嵓間深隠者不知幽趣在君家悼巖栖翁欲卜幽栖尚未曽豈知今日别交朋霜鐘敲落故山月夜漏滴殘賔館燈原上又添青艸塜社中不見白頭僧春風城郭還依舊緩步尋芳恨莫能舟中晚歸雨餘村聚暗桑麻問訊韶光去已賖野篴掲雲聲嫋嫋酒旗穿柳影斜斜荒原逺近多芳草幽磵東西盡落花巾錫又還城郭去卧敧篷底數歸鴉憶陳隠君㡬載先生共往還杖藜今日㫁松闗苔封白骨琴尊逺月浸空齋研席閒弟子未聞居墓左詩名長見在人間自言只憶蓮花國終不栖神鄉海山舟次江亭歸思悠悠極渺溟暫維舟檝並長亭春江水暖蒲牙白野岸烟銷柳眼青鳴犢帶聲登廢壠征鴻和影度遥汀不知何處吹霜角獨立天涯淚欲零次白提舉秋日與人汎呉淞韻秋風一舸共裴回日照川原宿霧開白鳥不知呉苑廢青山曽見越兵來清標拔俗元章字佳句驚人子美才我欲従行身莫遂㡬畨吟上水邊臺次韻無及長老見寄退跡深居楚水濵愛閒甘作卧雲人一身貧盡豈足道五字興來如有神江郭雨昬山色古柳橋風暖鳥聲春雖然不是鍾期耳世外偏將古調親虎丘春游得花字新路委蛇半帶沙到來疑失舊烟霞鼓鐘才動水雲合絃管未終山日斜嵓閣雨晴生細草石池春漲有殘花小呉軒上聊馮檻古木隂隂噪亂鴉過無得院每説江湖倦往還却歸此地揜柴闗舊栽修竹臨寒水更起回廊暎逺山夜半鼃聲來枕上日髙松景上窓間有時閒倚孤笻立覔得新詩自解顔月夜四首明河如練月如弓涼葉蕭蕭下逺空水國正秋無過雁苔堦終夕有鳴蟲故人自隔闗河外往信猶存篋笥中一盞青燈伴孤寂夢回吹殺破牕風漸老襟懐豈易寛强將詩句散愁端黄花開後重陽近白髮生來萬事難月夜獨眠松館静晚天清坐竹窓寒暗塵鎖㫁青琴索指甲雖存莫可彈鴈聲吹落五雲間帶月柴扉夜未闗寒氣僅傷凡草木秋風難老舊河山孔賔好學非求隠元亮休官為愛閒今古一株天上桂近來聞説有人攀隂蟲切切嗁秋露涼月姢姢照夕風鸞鳯㡬曽栖枳棘鴟梟多是占梧桐人皆酤酒追陶令我獨栽蓮學逺公堪笑當年槐國夢黄粱未熟巳成空次韻荅人見寄野水晴山遶所居水聲山色共如如作詩不學前朝體揮翰多臨北海書塵暗古琴人聴少艸深荒逕客來疎金蘭義重惟吾子長寄新吟到敝廬夜至市涇積慶寺蒹葭風髙寒氣深鴻雁叫渚日已沈青燈一㸃出林薄白屋㡬家居水心野岸經霜楓未落村船入夜路難尋意行漸與精廬近耳畔俄聞有磬音客中次韻荅平道士三首抱寂希夷二十年孤踪隠約少人傳優游泉石非徒爾玩弄文章是偶然槐市有時還縱步松窓無事且髙眠暫來江上尋詩友正值霜風落木天閒房瀟灑樂堯年寄我新詩信可傳世上利名都索盡壺中日月更悠然風回髙樹吹瓢響露浥虛庭警鶴眠聞説仙壇朝斗夜簫聲殷殷下遙天聞君有道已多年籍籍聲名海内傳釋老門庭雖異趣山林風月本同然蓴香水國堪垂釣草暖陽坡可醉眠金錫也曽飛碧落不妨伴鶴上青天余留市涇積慶寺壁間有劉時中阻風之作因次其韻江郊嵗晚草樹黄原野拍塞浮晴光飛鴻冥冥楚山逺游子窅窅呉天長柳並寺樓搖碧靄笛横漁浦隔蒼茫如今海宇清寧久聲教雍容洽大荒東塔廣福寺步入松門一逕斜小橋南畔是田家講經老宿多遺骨聴法天仙不雨花倚漢危樓栖野鴿隔窓髙竹蛻秋蛇但令泉石堪依止包笠重來豈憚賖留别歸心難遣促歸期一夕霜風動𣺌瀰壟麦迎寒抽葉蚤江梅待雪放花遲登樓擬作懐鄉賦臨水還吟惜别詩明日松陵重回首碧雲紅樹總相思雨中次韻寳書鈔罷事清吟但覺虛窓景易沈堦下亂泉空作響水邊嘉木自成隂雷聲殷殷雲頭黒風色蕭蕭雨意深不有同人逺存慰寂寥踪跡更誰尋書山家壁植槿為籓竹作門翁姑長守主人墳野藤不共厓松老磵水自隨山路分溪上月明秋逼雨壁間燈暗夜生雲茫茫塵世無窮事終日蕭然竟不聞秋懐次韻虛庭獨坐晚涼生一道斜河屋外明幽鳥帶雲歸樹宿清鐘和月出樓鳴弟兄南北音書㫁嵗序飄零客夢驚大雅髙風雖不競伊余時得㑹詩盟秋日雨中再用鉤字目送蒼旻无盡頭濕雲凝雨㡬時收看山舊榻還當檻待月踈簾罷上鉤蚤稻損花秋失望髙梧翻葉夜生憂雞鳴狗吠豐年兆何日重聞某水丘次韻荅人見寄憶昔江頭送别時歸舟欲上又還思百年塵事頻翻覆半世交游㡬合離天畔白雲惟舊色檻前青桂有新枝征鴻無限南來者不寄音書只寄詩悼芻長老苔色蒼蒼竹四圍山林雖是昔人非青春舊友有誰在白髪髙年空自歸禪榻塵昬孤磬咽影堂烟裊一燈㣲殷勤到此焚香罷獨對斜陽淚暗揮春日寺居荅人見寄古寺栖遲甫嵗餘客氊未煖又移居脩篁老盡猶遺種舊友亡來不寄書江郭雨寒聞雁少郊園春淺見花疎清香一炷琴三㺯終日蕭然掩敝廬京口車聲軋軋輾紅埃北馬南颿日夕來淮甸雪銷江水漲海門月上楚天開堤邊行飯多逢柳野外尋詩不見梅㑹散金山即歸去春風催我上琴臺上方孤墖巍峩出翠㣲湖光澹蕩照嵓扉綺羅香散游人逺鼓笛聲消賽客稀故閣已傾餘柱礎㫁碑空在長苔衣青山本是無今古㡬度殘陽宿鳥歸書故人壁湘簾髙卷雨冥冥松竹蕭森滿户庭芳艸春深隨意緑逺山雲盡向人青一川寒水横疎牖數朶幽花插浄瓶回首利名驅逐者不知塵夢㡬時醒遣懐境入中年萬事休但思韜迹老林丘西山夜雨寒侵夢南國春風雪滿頭桃李無私隨地發烟雲何意並人愁一雙窮相繙書手豈解尊前事獻酬次韻山村先生五首嚴陵臺下水潺湲漠漠髙風去不還處士隠廬遺路側永公書瓮出松間山田墝瘠民生儉郡邑蕭條吏事閒㡬欲清遊身未遂煙霞盤礴鬢毛斑定起空山尚有星悲笳杳杳上青冥壁間燈暗雅啼樹池上月涼魚闖萍文錦薦柈風字研綵繩穿夾梵書經舌端解使天華隊争佀無言對翠屏尚無閒手把茱萸豈得將身作醉扶留我香燈依澗壑聴人包笠遶江湖躭名冒貨争蝸角要埶圖榮捋虎須松景滿忩秋日短楞嚴才罷巳申晡緑蘿深處澗聲幽一片閒雲盡日留灰木身心都寂寂塵埃世事任悠悠壺中觀閣徒存想畫裏山川足卧遊若使杖藜能過此浮杯相伴狎輕鷗莫將學問負平生白石清泉暢野情槐國舊聞螻蟻戰鵲巢今見鵓鳩争子胥尚昧遭呉廢文種寧思辟越亨更有卞和曽獻玉荆山月下淚盈盈漫成鄉來嵗月苦蹉跎今日生涯又若何交友漫多情少合閒身未老鬢先皤水邊紅葉終難久天外青山豈易磨但得釣鼇竿子在短蓑輕笠傲烟波次韻无及長老蓬藋栖遲亦有年了无榮辱願誰憐道林解講猶騎馬魯望能詩却寄船苔壁晝深蟲吊寂紙窓秋破鳥窺禪焚香煮茗皆吾樂豈但清閒便屬仙冬日書況寄無照香氷紙閤畫沈沈古鑑横陳且照心喬木天寒風易急㫁河雨竭水難深爐頭煮茗才中飯庭下觀梅已夕隂老大才踈倦馳騁漫書幽況寄知音以前詩寄無照見荅稍遲輒自和促之此生誰暇計昇沈但欲蕭閒養浄心髙卧豈知浮世狹獨居惟覺故山深檐飛雪溜窻間濕日照空雲石面隂坐鄉西齋持宻語近來能作五天音無照既見和復以元韻荅之拂拭銅彛炷水沈跏趺相對可清心穿雲種玉青山逺破浪探珠碧海深滿樹春風傷渭北一篷夜雪憶山隂賡歌和曲非吾事聊演人間大雅音既酬之又用元韻遣興寄無照不鄉明時嘆陸沈敝廬堪隠莫年心蘭芳楚澤春愁闊月滿荆岑古恨深白首有名猶谷口青雲無夢自汾隂松風卧聴如韶濩膝上何勞緑綺音冬日作蒼松翠竹遶吾廬終日蕭然只晏如琴上不彈新曲譜篋中多貯故人書春生故苑梅開蚤雪滿寒江鴈過疏无限市朝車馬客豈知城郭有閒居巳未嵗感事二首心攅百感鄉空書此日才同少水魚曠野有風傷晚稻荒園無雨減秋蔬東林泉石容髙道南嶽煙蘿尚獨居縱使聲華動京邑未知何地樂耕鋤野逕秋深葉滿苔豈堪塵跡此中來堦前蟻陳衝還破花底蜂程挽莫回童子已提沽酒器山翁猶奉注茶杯長松怪石渾依舊相對何由笑口開遣懐三首堂堂嵗月水流東贏得身將槁木同草葉已零淹莫雨梅花才發值春風岐中厭作亡羊客塞上甘為失馬翁已有一枝栖倦翮翺翔何必羨𡨕鴻竟日何勞事苦吟漫因幽興寫閒心神魚出海摶風逺𤣥豹依山隠霧深縣吏每來欣有酒鄰翁却去笑无金平生不畜閒田地衣鉢隨縁直至今遯跡勿思磵壑間胥徒叫囂來扣闗首陽尚使夷齊卧潁水寧容巢許閒海上白鷗雖可狎雲中黄鵠却難攀何如穏汎華亭月莫學淮南賦小山除夕二首小閤春融坐不厭獨憐无月到松簷銅壺漏㫁五更盡畫角聲銷一嵗添風燭冷光涵素壁瓶梅疎影透湘簾莫將爆竹驚山鬼近日城中火禁嚴春入江天夜坐温嘉蔬喜得備盤飱笙歌不動還休市燈火雖張合閉門壟畆風寒傷薺麥山園地暖益蘭蓀近聞里衖兒童説明日庭中看水盆早春留别津亭烟暖柳絲輕欲上孤舟更問程野日照衣春色好江風吹面莫潮生遙山黯黯増羇思宿草離離動别情莫訝白雲无定在暫攜包笠去呉城春日至錢唐阻雨首寄山村先生客囱燈暗曙鐘殘泥潦従衡路未乾滿目雲山留我好一樓風雨見君難湖邉雪盡梅應蚤吳下春遲麥尚寒南渡耆英久寥落豈知猶有故衣冠登南髙峰絶頂客心江水兩悠悠髙閣閒登見越州細嶺日斜樵子過㫁厓壁立野泉流松根落石森兵衞天際孤舟片葉浮長嘯一聲羣響荅又攜青竹下嵓幽過西湖霏㣲煙靄滿遙岑春入長堤栁色深今古畫船供一醉㡬多紅粉得千金漁歌豈說游人耳莫雨偏傷倦客心幸有孤山梅竹在杖藜徐步作幽尋清明日山行羣鳥聲喧春日晴家家挿柳作清明溪雲落眼水邉坐花露沾衣樹底行野寺貧來猶換主山園廢後但存名都縁趣俗无新韻城郭幽栖過半生如鏡師剪竹四竿植為蒲桃架其一適活要余賦詩遂作此以塞請云蒼筤剪得出遙林架就危棚近壁隂柔蔓未垂珠落落短梢先挺碧沈沈月明亂影翻秋几露冷清聲入夜琴養取閒門表孤直莫教容易俗塵侵子虛以湘竹杖恵余兼貺二詩遂依韻荅之頒得山人古竹笻節間銷盡淚痕紅化龍定躍蒼波裏伴鶴還騰碧漢中蹞步安危存用舍百年前却付窮通相應海國歸來日繫向船頭取便風一枝誰剪楚山前却寄東呉遇客船打雨打風常在手挑雲挑月不離肩松根老石當秋倚花下幽蹊帶晚穿閒處未容頭角露且留横膝看青天漁父二首夕陽波上釣絲輕風入蒹葭窸窣鳴辭劔為憐逋客難鼓橈曽笑逐臣清數聲竹篴湘江闊一帽山花白髪明南北去來人自老㡬多空抱羨魚情罷釣優游老此身數椽茅屋並湖濵青雲富貴無多日白髮清閒有㡬人篷底未曽論伯越花間且莫問强秦紛紛世事皆如夢更送牀頭百瓮春庚申嵗莫三首是非無定底須聴飽食游譚更不經髮短意長猶困學智生耄及澷勞形松濤衮衮翻茶鼎梅雪紛紛落瓦缾門外數峯天削出亂暉東旭倚空青江郭隂寒天未晴嵗華抛擲又遐征蟄雷失序先春動野雉知時鄉曉鳴草木自堪同臭腐雪霜何必苦従衡謝公心雜陶公醉負却匡山白社盟强顔求舊情還異枉已攀縁埶必乖白雪豈傷侵紺髮黄埃唯恐涴青鞵倚松閒看雲生石揜室幽聞葉墮堦無用散材何所適布衣蔬食老巔涯經故人所居桃花灼灼柳依依院落荒涼晝掩扉石沼水乾魚逝久杏梁巢覆燕來稀壟頭未說人澆酒世上先傳客賣衣欲對東風寫離恨郡譙吹角莫雲飛天際歸舟圖天風低柳拂長堤舟入蒼茫逺景㣲炎暑有時銷客路灘聲終日在漁磯身隨江海馴鷗鷺夢落山林飽蕨薇従此束書歸舊隠晦名韜跡老巖扉秋思二首西風吹上洞庭波凉葉紛紛别故柯社燕畫檐秋影絶候蟲文砌夜聲多青藜扶起宜將老緑綺調成足倚歌城市往來今已久擬收孤跡寄烟蘿人生事事皆前定切莫猖狂欲妄行季子金多終富貴張儀舌在漫従衡柴桑雞狗還追放甫里烟波絶鬬争楓葉已丹秋欲老水村隨處搗香秔辛酉嵗九日二首雲物凄凉秋意深江山何處可登臨一頭白髮驚風雨滿地黄花恨古今木葉暗隨鄰杵落草蟲寒並夜牀吟半生已分成樗散城郭長縣澗壑心九月江天絺綌涼眼看莎逕雨餘荒菊花不醉重陽酒柳葉還凋午夜霜席上未聞楓作虎山中誰信石為羊傷嗟杜老飄零久近亦歸來理草堂破窓落落疎櫺紙半無冒寒猶憶去年糊飛螢暗入侵衣亂涼月斜穿伴燭孤秋老蟲絲兼葉掛雨晴蝸殻帶苔枯候齋山鳥來還去㡬畨相闚不受呼奉寄翰林趙學士二首孟頫玉堂學士晉清賢上國歸來雪滿顛畫妙未曽池畔作書工自得枕中傳溪山静對堪娛老松鞠長存可引年見說有時因覔句醉扶鳩杖看鷗眠下馬趣班覲紫宸肌膚玉雪錦袍新北門視草稱三俊東閣揮毫第一人月隠掖垣分燭夜花迎御輦賜衣春文星肅望光芒正爛爛仍縣霅水濵過北塔有感次韻脩廊徐步暗長吁古木猶存斧爨餘寒竈未聞煤墮甑空庖將見釡生魚香燈影㫁經行少鐘鼓聲沈學者疏回首舊房抛已久草埋蕪没任鳩居夜懐匡牀嘿坐夜燈明寥落霜天鴈一聲身世已成黄髮夢乾坤唯長白雲情綸竿獨老忘軒冕舟檝全生變姓名小大自來皆適性二蟲安得是同盟嵗晚書懐二首雨霰交飛嵗欲除閒園草木已昭蘇盤登野菜無椒酒盃貯香秔有土酥禍福固應論塞馬雌雄何必辨城烏曳裾掃跡俱休問自爇黄連擁地爐天寒静户少人過殖殖閒庭爵可羅世上眼空蕉鹿夢車中聲㫁飯牛歌泥融莎逕春風近潦没蔬畦夜雨多清梵欲消江月上磬聲松韻冷相和除夕次韻無功屏跡丘阿每鮮歡老逢除夕恨漫漫生前聲利情偏澹身外經書興未闌狡兔漫垂三窟戀鷦鷯終寄一枝安百年浮世才炊頃推枕邯鄲夢巳殘落梅晴雪霏霏灑砌苔浪蜂欲去更徘徊空傳淡影浮歌扇不送寒香入酒杯隴首故人千里隔江南驛使㡬時回翠禽莫怨髙樓笛一度春風㡬度開柳寒條欲軟雨㣲㣲染作鵞黄學舞衣漢苑露濃宫葉重汴堤風暖岸花飛流鶯漫叫春還老酒斾空招客自歸若鄉津亭管離别争如陶户静相依雨中遣興雨横風狂緑野隂孤城蚤覺已春深蒼松倚壑有寒操紅杏出牆無古心鄰館酒甘方擊瓮客窻人静罷彈琴華墳竺誥皆師友漫鄉閒中作聴尋徐氏園池廣亭髙榭接遙鄰野雉籠蔵錦翼新柳色上衣薌逕曉蜂聲浮席畫船春秋千自濕花間露鸂䳵還驚沼上人莫訝粉垣深揜護青山低處是紅塵代悼亡蓬閬思歸厭世樊青鸞緩引别朱門鏡中暫隠春風面花下終歸月夜䰟簮珥獨留貽婢妾田園長守有兒孫紛紛弔客皆豪貴跪向棺前酹酒尊留别敬之講師麥擢蝦須春欲歸青山影裏欵山扉松風瑟瑟吹人面野日荒荒照客衣波上燕忙知夏近嵓間僧老出門稀明朝又振歸城錫清夢還應遶翠㣲秋日次韻二首息景城闉嵗月深見山還作采薇吟未曽世上期青眼獨鄉閒中保素心鞠為花開登古缶蘭因香在守空林可人最是新栽竹鳯尾䙰褷已及尋緇塵不到白雲深晝寂空聞木客吟栢子當香堪達信石頭聴法豈知心化牛鬬虎無杯渡放鶴沖霄有道林睥睨寒山舊詩巻上騰光燄數千尋秋夜懐古促織侵燈泣短莎夜深凉露下銀河井梧葉脫秋聲減江月煙銷霽色多千載悠悠遼鶴語三生渺渺牧兒歌豈知世上無窮事今古還應逐逝波趙子固所作蘭蕙圖王孫翰墨妙無倫寫出胸中萬古春蘭葉夢寒悲楚國蕙花香冷憶騷人紛紛蕭艾誰遺種落落山林自有鄰莫訝幽姿能岑寂石根終隔馬蹏塵春晚矮窓日月無今古閉户争知春去來清鏡静臨多白髮好花閒看半蒼苔䵷傳鼓吹池塘雨茶展槍旗澗壑雷海燕未回寒尚在暮雲重疊鎖崔嵬寄𢎞道書記閒愁不入酒杯中落魄江湖佀轉蓬鶴髮歸來風月在錦心吐出語言工芭蕉葉大窻全緑芍藥花開砌半紅只尺林泉滯形跡對牀煎茗㡬時同再用紅字荅前人抱景亭亭澗壑中眼前多作倚麻蓬鷹鳩異質無非物枳橘皆名孰是工聲遶堦除春雨暗光流几席夜燈紅詩筒莫厭勤來往草木争知臭味同寫興三首翠霧沈沈雨乍收晚窓叢桂小山幽枕中孤夢通三世林下餘生寄一丘耄及犀顱便簡寂病侵鶴骨倦清遊明時但得身强健水曲巖阿足自由目中忽忽更童耄世上紛紛自盛衰張翰吏閒歸去蚤季倫財散省來遲桃花浪急魚生子柳絮風柔燕領兒未必靈丹化頑頓擬將何物鑄鍾期不知名跡堪為累蟻垤蜂房亦鬬强小黠大癡俱陸陸寸長尺短付茫茫米鹽胸府猶登坐鞍馬風流足撫觴案上簿書勤記録夜窻燒燭學研桑山中二首巖屋栖遲信有年豈同魚鳥樂天淵身間尚不耽閒味地静何嘗住静縁林下晝營燒筍火石間時引煮茶泉菜畦香燼青烟散月滿松頭鶴未眠萬事無求心便安莫論人世道涂難風聲遶樹夜將半月色到窻燈未殘峭壁倚天蒼蘚古㫁厓飛瀑白雲寒飢飡困卧隨縁過趼足何勞作野盤春晚二首窻中雨霽見遙岑拂羽鳴鳩送好音我懶未能㕘俗事詩工自足醉人心掃堦喜擁青松鬛對客慵彈緑玉琴一枕江南三月夢桃花結子柳成隂丘壑由來跡可逃豈容塵土涴雲袍石鼎湯浮寒蟹眼陶杯文刷秋兔毫林塘瀰瀰白水滿山館亭亭青樹髙得句未能書雪繭屐齒欲折心忘勞苦雨積潦横流路不分滿空烟靄暗朝昏烏鳶跕跕墮荒圃風雨瀟瀟失逺村芻米賈騰愁白屋管絃聲沸醉朱門無言桃李參差放佀怯春寒欲㫁䰟春蒐圖酸風射眼路迢遥斜跨銀鞍度渭橋野外翻身捎勁鍉雲間灑血落盤雕犬循荒磧威偏壮獸困重圍力易消什伍相將歸細柳亨羶釃酒醉春宵讀宗鏡録珍閟龍龕㡬百年我生何幸得披研真空境寂非文字妙有縁生立聖賢權實圓明般若智果因清浄涅槃天殊宗異學求源委拭目方知萃此編癸亥嵗寓錢唐千頃寺述懐髙閣工書三十年蓺成媒禍少人憐猖狂得意既由命坎壈纒身莫問天半夜飛蚊消廣夏一天凉雨潤髙田雖然老朽成羈絆還在山邊與水邊秋夕井閭鳴雨夜漫漫語静長廊燭未殘月色浸窻花漏迥蛬聲浮席竹房寒世情竟作秋雲薄禮數渾如野水寛彈鋏掃門非我事委身嵓谷自盤桓書鮮于伯機詩後兼用其韻昭時丹鳯雊崇岡吐出神珠埒夜光眼見牋麻才只尺耳聞名姓㡬星霜北山水石増吟興南蕩絃歌助酒狂千載不須嗟寂寞已留遺墨徧炎方登虎阜再用伯機韻髙標孑孑插雲岡深殿孤燈葆寂光巖畔野芳初帶露樹頭山實未經霜滄溟自引浮杯興佳節還羞落帽狂小艇不知歸路晚到城新月挂金方秋山圖淅淅凉風動泬寥白雲紅樹擁岹嶢扁舟倚岸不知久拄杖穿林頓覺遙樓閣蔽虧横逺漢澗溪舂激度危橋沃洲自合支公住曼倩従教隠市朝贈楊秀才江城已作黄花晚磵壑方驚白髮秋樗散㡬年抛寂寞憐君此日肯相求雲霄直上饒騎鶴湖海同盟願狎鷗老我未忘千里志杖藜終約看淮流冬日寄無功黄鞠當堦爛漫開小窗紅葉自成堆天寒但解冰霜至人老争知嵗月催萬事不求真富貴一毫為累即塵埃風流來往唯吾子擬共巡檐看蚤梅癸亥嵗莫書懐白雲深處掩茆茨回首人間萬事遺愚知得時皆有命古今造物本無私阮公漫解開青眼墨子終須泣素絲臘盡雪銷梅放後寂寥寒谷是春姿遣興五首五十雖賖病見侵閉門終日少相尋春鶯漫逞千般語老驥終存萬里心花遶竹房紅作陳柳垂莎逕翠成隂江南三月清明後便有蛙聲聒夜深博山烟靄作空濛脈脈幽馨鼻觀通一院杏花寒食雨數聲黄鳥緑楊風忙中日月何曽異静裏乾坤自不同蟲臂䑕肝隨所化未能勞力問崆峒身前萬事若浮塵過眼従衡日日新蛙黽得時多意氣鯤鯨失水少精神青山古木丘園晚白鳥蒼烟浦溆春回首呉淞興無限鴨頭新漲緑粼粼天運循環杳莫窮生生化化古來同一百六日寒食雨二十四畨花信風此身不寄鵲巢内孤跡聊蔵人海中深院日長新睡足倚闌閒數北歸鴻千載誰言柳花香醉李吐出錦綉腸江邊春雨一犂足天外晴絲百尺長空山無人薇蕨長流水落花鶯燕忙自來貴賤皆歸盡草木衰榮豈足傷寄白雲反闗銷景湖水眉吾子政是安瞑時春寒未成筍蕨夢老大得赴煙霞期松湍潄壑青燈迥篆縷縈簾白日遲清磬數聲經巻罷風前洗耳貫休詩追和宋馬雲訪踞湖山仇隠君韻白雲飛盡碧山空屋外夭桃破曉紅幽隖樹深難隔世平湖水闊易生風丹光射斗驚朝士酒氣薫林引釣翁未識鳯書何日下隼旟今已到嵓叢過友人所居春紅銷盡緑隂繁簾幙風輕燕子還柳絮漲天清晝永蛙聲動地白雲閒亭亭鉅筆林間塔隠隠脩眉郭外山不是君家有泉石杖藜那得事躋攀次韻荅彦上人城郭幽栖鬢欲衰豈堪煙浪隔相知鴻歸絶漠疏來信鵲噪虛檐辱寄詩黄葛暑煩還御蚤蒲葵晝寂獨揮遲雖然兩地同明月跛足何由得望之光福寺用唐顧在容韻浮圖突兀倚雲中頂冠神珠爍太空地接近村分野緑天縣落日隔溪紅穹堂廣坐凉銷夏絶壁髙山夜吼風齋鉢久虛龍象散上方留得住山翁甲子嵗莫時序川流齒漸増此身還顧百無能心縣絳闕耽名客夢遶蒼山賞静僧古樹月明深巷雨逺天鴻過矮窻燈平生漫有烟波興擬宿蘆花尚未曽虎丘用唐李紳韻闔閭丘墓名空在代逺時殊事不同碑碣尚無唐故跡山林寧有晉遺風刹旛影動青冥外齋鼓聲消莽蒼中若使石頭曽聴法豈能終日並禪宫代悼亡清鏡孤鸞曉影沈但傷兒女百年心華堂遺像有時見瑤席慈容無路尋夜半窓紗明月照架頭巾帨素塵侵數莖白骨歸黄壤回首人間隔古今贈艾幼清教授庭暉故鄉抛擲寓東呉客館凄凉尚讀書縣令棄官猶有酒先生寄食豈無魚江城春老花飛急槐市風清燕過初草木想當名已熟往來多識馬相如無照林亭累土崇丘作小亭手栽花木滿林坰郡中髙樹巳全緑屋外逺山才半青過眼榮枯荒圃草到頭聚散野池萍餘生但願身長健杖䇿時來對翠屏自陽山歸舟中作小麥青青大麥黄澗松風急夜聲長轎穿細路春泥滑花落清渠野水香嶺上獨留雲作葢村邉多見石為梁楓橋寺轉閶門近回首西山已夕陽偶讀中峯和尚和瀋王王璋留題真際亭詩因而有感遂次其韻二首衆峯序列作愁顔鶴怨猨驚尚未閒月滿蘿庵人寂寞風生松嶺澗潺湲王因問道來天上師為逃名去世間獨撫遺編成浩歎水雲無路扣𤣥闗西峯泉石可怡顔地逺塵踪日月閒樓觀耽耽横嵽嵲杉松矗矗蔽潺湲安危豈在羊腸裏寵辱偏生馬足間自是名王尊有道閒攜賔従及柴闗贈叔恭負笈擔簦計已灰歸來蕭寺掩莓苔呼猨别磵曽抛果放鶴它山得看梅樵逕雪晴芒屩出江橋風熟布帆開反思身外無窮事不直窓間水一杯新居次韻山村先生天地茫茫喜定居莫年應是惜三餘青燈不作前朝夢白首猶觀後世書遼海舊傳千嵗鶴謝池今見九洲魚清風朗月皆疇侣鬻茗焚香足晏如曉作次韻前人東旭朝隮萬象明新鴻嘹嚦度江城寒花獨對情偏淡鄰杵幽聞韻更清荒逕草衰秋欲老逺山雲盡雨初晴半生已作溝中㫁潦倒終非待晚成漫興二首栖遲久已傍嵓隈駒隟光隂自暗催江國夜寒楓葉落楚天霜冷塞鴻來清遊振䇿尋花隖野望褰衣上石䑓堪笑人間未歸客摩挲銅狄欲興哀平生無夢到槐安鏡裏青春髩已乾霜氣稜稜摧衆草光風漠漠汎崇蘭塵埃世事隨時變澹泊交情到處難㡬度呼童課經罷看雲黙黙倚危闌淮隂侯羣雄逐鹿競紛紛虎鬬龍争埶未分背楚棄官皆失義下齊求國是要君蒯通詭辯誠難信陳豨上奸謀豈易論當日更無鍾室嘆豈勝竹帛載元勲舟中西出胥門路不賖短篷回首已天涯髙林鵲噪青山近逺岸人行白日斜旛影浮空標野寺耞聲隠谷隔田家十年來往成何事贏得蕭蕭兩鬢華呉嶺道中山村人過犬吠竇野澗魚躍泉鳴沙江城雨雪三春莫嵓屋松杉滿地花芳草路邉逢廢井夕陽川上見歸雅年年寒食偏傷感能上新墳有㡬家垂虹亭長虹夭蟜卧平湖奕奕新亭畫不如簷切太空喧燕爵影搖寒水䕃龜魚它山雨過漁歸久别浦潮回月上初今日豈無題柱客㑹應來此駐軒車讀時太初海昌詩巻旅宦迢遙滄海濵熬波終日役疲民夜窻夢覺驚風雨寒燭吟殘動鬼神覽鏡每傷新白髮把杯還憶舊青春空餘翰墨傳天壌老我林間失故人畫梅曽向孤村見此枝杖藜徐步雪晴時香飄野路傳春早影上山牕礙月遲處士詩存猶可讀逃禪骨朽却難追芬芬瓊蕊無今古羌笛髙樓亦漫吹秋思梧桐百尺金井髙秋風吹葉聲蕭騷莊生是非付一指杜老飄零嗟二毛月明江上雁飛急木落窻間人夢勞非熊自起磻溪釣淮南小山方遁逃楊尖觀音院壁間有故御史周公景逺留題一再讀之令人短氣遂用其韻為詩悼之以寓平生交契之意拂塵讀罷思悠然詞翰空存逐逝川銀管脩文歸地下玉棺承詔墮天邊聊城丘壟木未拱蕭寺鶯花春政妍欲致生芻惜無路漫歌風雨度年年論詩是非不到白雲中髙卧冥冥碧漢鴻典雅始成唐句法麁豪終有宋人風智愚願作登壇將茅土偏旌葢代功狂妄末流徒好惡豈知到海味還同山中寂寥空谷久相容行道何須向别峯山腹引泉同煮茗嶺頭乗雨為栽松倚天傑閣巢靈鶴徹海澄潭卧毒龍樵客豈能知住處草堂終日白雲封寄無功雨雪霏霏嵗暮天路泥活活古城煙出門曳杕難相就矯首停雲恨莫前瞑色半窓書引睡屐聲盈耳客驚眠巳聞處處添新漲早晚春湖共放船懐安養詩獨立天涯送落暉故鄉抛擲淚沾衣久知慈父嗟逃逝早辦誠心好賦歸三界竛竮真可吊四生流浪竟何依白毫今古無私照攝引西馳願不違谷響集巻二
