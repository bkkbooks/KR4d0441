body:
  text: 谷響集别集類四元提要臣等謹案谷響集三巻元釋善住撰善住字無住别號雲屋嘗居吴郡城之報恩寺往來吴淞江上與仇逺白珽虞集宋无諸人相酬唱集中癸亥嵗寓居錢塘千頃寺述懐詩有髙閣攻書三十年句從英宗至治三年癸亥上推三十年為世祖至元三十一年甲午距宋亡僅十四年其贈隱者詩有對食慙周粟紉衣尚楚蘭句葢猶及見宋之遺老故所作頗能不失矩矱觀其論詩有云典雅始成唐句法粗豪終有宋人風命意極為不凡及核其篇什則但工近體大抵以清隽琱琢為事頗近四靈江湖之派終不脱宋人窠臼所言未免涉於過髙然其秀骨天成絶無蔬筍之氣佳處亦未易及在當時詩僧中固宜首屈一指也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c1bf8dd39ba9a5679248ffbce7cbd4d10885e21c72f5a092b278f8d5bda2eae6
