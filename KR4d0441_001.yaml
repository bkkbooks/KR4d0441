body:
  text: 谷響集卷一元釋善住撰五言律詩石湖楞伽寺寺占石湖上地幽人境清樹影掃不去苔痕踏又生日午鼓鐘寂年深臺殿傾覽勝偶來此但聞春鳥鳴晨興瓦溝霜欲滿殘月已沈西一枕浮生夢數聲鄰鬨雞江橋船未發水驛馬頻嘶東旭光芒動塵埃處處迷莫行牛角塢中側足入幽塢松深蘚石斑夕陽初過嶺樵子又登山澗水流不歇秋雲去復還即應來此地結屋翠微間龍興寺用唐綦毋潛韻徽額唐朝賜還將表寺扉塵侵碑上字風落樹間衣僧燭晝焰短剎幡晴影微靈烏因得食時並畫簷飛秋居棲遲寄窮巷不異住荒村寒草生枯樹秋苔上敗垣衆山皆繞郭一水獨當門抱甕非吾事乘間學灌園有懷短髮已垂素凄涼道尚孤民間有苛政天下是窮途白骨堪重肉青山豈免租空將釣竿手舟楫並江湖寄如鏡師舊房拋已久不得共為鄰白髮坐深夜青燈懷故人鸛鳴孤塔雨花發小園春我欲西湖去從師一問津寫真浮雲類我身形影暫相親見處若不徹傳來那得真問年空老大多病減精神畫向麒麟閣都非我輩人九日次韻雨洗遙空淨殘陽雁影新秋山動髙興古木倚間身岸石白於雪水楓紅似春王𢎞千載酒此日送何人秋日野望寂歷村橋畔夷猶野望時路長征騎疾風定去帆遲城晚牛羊下天秋草木衰數聲何處笛渺渺隔煙吹贈隱者生無軒冕志老不釋漁竿對食慙周粟紉衣尚楚蘭江城猶雨雪花柳政春寒窮達皆由命初非行路難夕陽荏苒迫崦嵫餘暉還更遲空山縣古木深竹映荒祠野望思家逺江行怯路危亂鴉歸盡處腸斷在天涯夜過山寺夜永諸品靜悄然人不逢千山萬山月一聲兩聲鐘野露濕煙草瀑泉滴雲松足倦未遑息招提在西峯悼隱者昭代徵賢急丘園尚考槃安知新宇宙猶有故衣冠訓子芝庭曉談玄水寺寒遙憐隨化盡泉户夜漫漫秋夕懷古抱疾卧長夜愁心那可降蛩聲寒並枕月色冷侵窗賈傅弔湘水杜陵哀曲江空懷千古恨無語對秋缸秋色漠漠混空際遙遙接水濱凄涼連白鳥瀟灑滿青蘋不礙古今路能隨南北人西風吹欲老楓葉醉于春鄧隱君牧標格類孤鶴翩然獨往還彈琴坐白石把酒看青山鬚鬢經年改身心竟日間料知塵世事無復得相關書空山壁選得雲深處翛然獨掩關春風思故里夜雨夢他山坐石逢花落看松見鶴還都緣了喧寂忘却在人間九日扃閣白雲裏江湖罷問津寒花應佳節濁酒醉何人風雨兼秋思乾坤獨老身一聲新過雁不覺淚沾巾再用前韻世波方浩渺引領欲迷津谷口多髙譽山陽無故人風霜催短鬢泉石繫間身心結還應解空悲花㲲巾送人往江西野外秋將莫征塗更寂寥孤舟萬里客幾日九江潮木落煙波濶猿啼嶺樹遙逺公靈塔在柏子莫辭燒聽琴世無鍾子耳山水竟誰分妙指若不識希聲那可聞鴈啼秋塞月猿嘯晚峯雲宇內馳名者唯師獨出羣雁影衝風起沙際波面見斜飛迢遞橫秋色髙低亂夕暉天空江路逺野曠旅人稀猶憶支笻看蘋花滿釣磯送人之冷泉兹逰無伴侣逺樹獨依依日落征帆急天寒過客稀斷雲隨竹錫殘雪照麻衣應渡西湖去聞鐘入翠微荆軻壯氣干牛斗孤懷凛雪霜只知酬太子不道負田光易水悲歌歇秦庭俠骨香千金求匕首身後竟茫茫秋夕髙梧初下葉深壁已啼螿劍閣來書斷函關去路長薄田傷夏潦荒圃怯秋陽夢覺中宵月紛紛滿屋梁幻住草廬出郭無多路翛然逺俗氛春流上髙岸野日照荒墳屋老惟生草山晴不起雲長年栖此地世事未曽聞送無學之龍遊吳天秋欲莫之子更何之此别非千里重逢是幾時鐘聲出谷靜帆影度江遲禪暇看題壁摩挲張祜詩寄天目隱者獨住西峯頂寥寥誰與同晝燈昏嶽雨夜磬隱松風古澗流寒碧幽花墮晚紅更無塵事擾終日白雲中送羽人還金華鶴氅華陽巾碧瞳光照人乾坤三尺劍雲水一生身杜宇空山暮桃花古洞春石壇歸去後松月夜朝真楊花池塘春欲莫散漫復霏微未得為萍去先來作雪飛帶泥粘燕嘴和雨點人衣向晚東風急飄零無所歸送法界二兄歸侍師二子芝蘭秀君應道不孤路傍還棄櫟屋上且瞻烏殘日下髙木秋風吹太湖南歸侍巾舄不是為蓴鱸寄無照不向峨峯住還尋舊隱歸蒼苔生地遍白日出門稀竹月侵虛几茶煙上淨衣江湖曽有約願子莫相違古道古道久榛塞今朝始廓然乾坤新雨露華夏舊山川世上無周鼎民間有漢錢不須聞擊壤已是太平年逰石湖諸寺得黃字輟棹事登陟湖山春日黃風暄花氣重嵓靜緑隂涼石色兼苔古松聲挾澗長未能窮勝絶半嶺已斜陽次韻無照見寄自從居此地疏懶得長間花落琴書上泉生草石間雨聲寒繞樹野色靜連山苟不嫌荒僻來兹共掩關書無學壁淨室焚香坐心將萬境空夜窗山月白曉殿佛燈紅無夢到天上有書來海東煮茶迎道侣石鼎響松風宿山寺山寺夜逾靜雨餘涼氣浮明月上松頂髙河橫屋頭疏磬出林迥殘燈照像幽倦客正無寐寒螿啼素秋送白雲之鄞二首迢遞東州路孤雲伴去蹤聖燈當夕見海舶近秋逢弱水蓬萊島懸泉乳竇峰靜吟山月下何處倚長松澤國東南郡迢迢接會稽人煙逢海斷山木與雲齊夜汲分波月晨征候店雞却愁孤錫返草暗竹房西秋日有懷道路限南北相思無已時夜深空入夢天濶斷來期水國燕歸盡關山雁到遲秋風與離恨添得鬢成絲次韻答人見寄愛間甘遁迹短鬢二毛侵幽吹生松麈流泉入夜琴江猿乘月聽野藥破雲尋幸有忘機者時來話近吟次韻如鏡師見寄日下空馳影松根好息隂逺山秋後瘦荒井雨餘深書篋慵儲藥經窗喜挂琴吳臺兼更近來此共幽尋送人之江西萬里孰相從輕包與短笻故交今日别新識異鄉逢風咽湓江雁雲沈嶽寺鐘兹遊多勝剎何地寄髙蹤老僧白髮竟不剃天寒懶下牀齒疏欣飯軟睡少畏更長語劇心猶壯年衰事易忘衆中論夏臘莫問幾青黃書無功房倦遊歸故隱聊復寄間心枕石聽松卧看山倚杖吟燈明春殿靜鶴唳古廊深湖海知名者時來此訪尋禮楞嚴大師塔牢落城南寺真軀鄉此藏看碑知嵗月見樹憶興亡修竹當寒砌幽亭背夕陽壁間詩懶讀自炷瓦爐香秋夕天髙雲過盡落落見疏星月色經秋白燈光入夜青細蛬鳴暗壁亂葉響空庭更愛嵓房靜重看未了經無得訪宿窮居誰肯到念子逺相過嵗月今如此江湖意若何空庭寒氣重髙樹夜聲多坐久疏鐘盡月明生薜蘿嵗晚三篇蘭若依城市蕭條門巷深夜闌春漏斷窗近曉寒侵書幌無燈火禪堂有磬音幾番清梵罷紅日上遙林窮臘見春回荒園梅亦開曉煙迷郡郭寒日上樓臺吟癖丹心苦年侵白髮催幽懷感時事臨眺欲興哀陋巷寡輪鞅開門對翠屏氷銷春水緑雲盡晚山青嫋嫋來孤笛熒熒見小星亂鴉棲已定猶自步間庭賦得聞琴送范總管佑萬籟聲初寂琅然彈正音自非鍾子耳誰識伯牙心急雨翻秋澗寒風振夕林豈堪聞曲罷又動别離吟蟋蟀西風吹蟋蟀切切動哀音易入愁人耳難驚懶婦心寒燈孤館外秋雨古城隂聽極無由寐終宵費苦吟寄無照相思不可見撫景念離羣無酒難留客有詩堪寄君折花衣惹露題石筆粘雲更有中宵月清光可共分次韻答白提舉珽見寄默默抱沖襟間庭草色深了無榮辱事寧有去來心待月登溪閣彈琴坐竹林不知靈竺寺何日共幽尋卧痁方兹送窮鬼山鬼又揚威熱極頻翻枕寒深數蓋衣破窗秋氣重敗葉雨聲微夜久青童睡孤燈掩竹扉贈陳隱君發處士家何在花街近栁橋半生拋舊業獨夜憶前朝老景青燈逺春風白髮饒愛尋方外友時復到僧寮鶴梳翎看瘦影嵗久頂門丹春晚眠莎暖秋深警露寒羣飛滄海濶孤立白雲寬昨夜山房外一聲驚夢殘宿山寺次韻子封先生國暝投雲際寺深殿一燈微海底月已出山中僧未歸澗聲經雨急林影入秋稀明發尋征道還愁露濕衣秋懷漸漸身將老蕭然祗布衣白雲終日望滄海幾時歸夜雨窗燈暗秋風木葉飛十年流落後兄弟信音稀贈隱者城郭無心入全家住草堂丹青陵顧陸翰墨謝鍾張野外耕春雨溪邊釣夕陽爾來思屏迹見客懶衣裳寄友生分違若未久相憶似多時後會將何日重來預作期夕風翻急浪寒月墮髙枝寄語同人説詩翁鬢已絲喜雨涼生炎暑退風物竟蕭騷數日更無雨三吳應不毛潮回煙渚濶天豁月河髙已報香粳熟空虛政可逃悼友人獨留行道處仍與竹房鄰昔作煙霞侣今為冥漠人孤燈寒雨夜殘月影堂春念爾無由見傷心淚滿巾過北塔有感重經栖息地歷覽思無窮古殿生春草長廊起夕風鳥啼深竹靜花落壞房空會學期全盛無因與昔同雨中次韻生涯存一鉢半世寄林丘夜雨若不歇春田應更愁亂雲埋島樹髙浪激汀漚嵗事誠難卜豐凶似可憂晚望懷巖栖翁晚望荒臺上孤笻手自持柳條擎雪重溪鳥遡風遲枮草春還發陰雲凍不移何當髙世者來此共題詩山菴平生愛幽致況得共跏趺片月挂木末一峯當坐隅斷猿寒欲下驚鳥夜相呼世上耽名者還能到此無寄題郊居郊居逺塵境結屋枕滄波坐上見魚擲燈前聞雁過晴堤惟種柳秋圃半堆禾我欲攜笻去無由出薜蘿贈無照皎皎煙霞客飄飄雲水僧半生三事衲萬里一枝藤野澗尋猿度晴峯放鶴登他時佩心印又得繼南能幻住草廬夾徑列杉竹茅堂絶四鄰野僧秋不到明月夜相親林靜鳥窺室泉清魚避人何時離城市來此寄吟身月夜聞笛有感獨坐聞鄰笛悽然感昔逰西風吹白月客子動清愁辟俗思求隱懷鄉欲上樓間身看漸老此夕又逢秋端居端居無外事雅稱寂寥身厭踏黃埃路甘為白石鄰草長思逺客花落惜殘春幸有窗前月依依冷照人次韻子封先生答山中僧名山不肯住自欲老深雲鑿翠通虛牖鋤荒出壞墳花開留客醉果熟與猿分更莫逃幽隱音書難再聞虎丘緩步入林扉崎嶇一徑微亂蟬鳴古柳孤塔立斜暉講石苔侵遍生臺鳥下稀山雲念寥落簷外冷相依遣興身世事無限餘生奈老何探梅逢雪盡出郭見山多葉脫鳥驚夢氷銷魚起波爾來思隱劇夜夜夢煙蘿寄中峯長老中峯峯頂寺長憶舊逰時雲暝鶴歸急山深月到遲亂藤懸雨壁壞帛挂風枝終亦攜瓶錫相從支遁師寺晉支遁禪師道場林間性懶難趨俗林間且息機卷簾逢客至倚杖見僧歸琴響泉流砌香浮雲滿衣幾年居此地鄰國識人稀山中夜集焚香坐遙夜滿目是同人泉石三生友萍蓬百嵗身松鳴疑作雨花發似偷春後會知何日清言莫厭頻橫塘般若寺相傳般若寺建立自唐朝一水門前隔數峯天外遙堂虛松韻集殿冷磬聲消後夜空山月歸僧度石橋治平寺野寺知名久因來得暫登澗松風瑟瑟山路石層層雲護看經室紗籠照像燈幽人終解事煮茗接間僧寶積寺花宫隱翠微路轉見嵓扉荒址遺鐘在斷廊殘葉飛石池龍去久松樹鶴來稀愁絶空王殿凄涼掩夕暉無得見訪結菴依陋巷門徑冷蕭蕭放鶴看雲久尋山出郭遙雨添新緑漲春逐亂紅銷不是同懷者誰能訪寂寥霣葉霜後色初變風髙始亂零和雲流逺澗雜雨下空庭掃處兼僧影燒時帶鶴翎翻思在春日繞屋正青青夜懷舊山歸未得時展沃洲圗白髮老還有黃塵夢獨無陰蟲侵夜急寒月鄉人孤身外生涯在銅瓶與瓦盂宿市涇積慶寺古寺並溪邊間來假榻眠亂蛙啼夜月垂柳裊晴煙馬驛三州路風帆幾處船明朝又歸去重到是何年送中上人歸里相留已無計欲别手重攜客路連愁逺鄉山入望低野花秋寂歷江草晚凄迷舊隱重歸日寒螿夜夜啼次韻送前人旅館政蕭條孤城秋氣饒歸心懸水寺别夢繞河橋塞北鴻初至江南柳半凋悠悠片帆去望極欲魂銷北塔秋居地僻人來少門間草自長霜風催落木秋雨暗殘陽濕菌生枯枿愁鴟立壞墻若非便寂者應是厭凄涼重過積慶寺此夕知何夕青燈喜復同荒階