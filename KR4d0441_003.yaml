body:
  text: 谷響集卷三元釋善住撰五言絶句丹陽夜泊趨程前路逺極望雨冥冥夜宿官河口閒田鬼火青釣者江上正風雪歸來且掩扉白鷗無覓處終日繞漁磯幽蘭二首日長深谷靜蕭艾漫同居莫道閒花草仲尼曽下車猿嘯楚山晚月明湘水寒濕香吹不起風葉露漙漙暮入吳山寺裊裊松陰路萋萋碧草長入門人不見一犬吠空廊春晚春光不可駐徒抱惜春心一陳黃昏雨落紅苔徑深送人還山偶隨流水出閒趂白雲歸步石苔侵屐攀松露滴衣庭梅庭前一樹梅嵗久滿身苔不見春風面含香未肯開月夜聞笛笛聲何處起獨客易愁絶休將江上曲吹落山頭月詠雪片片下遙空千山樹色同衡門正寒餓華屋醉春風送西白朝行白猿啼莫行黃葉落迢迢一片心還栖在廬嶽牧豎看雲上陂陀晴林露猶滴夕陽呼伴歸騎牛各吹笛林下林下清閒極塵中日月忙逸人耽濁酒漁父愛滄浪春興冉冉春將暮悠悠日欲殘東風特地惡不道杏花寒晚晴白雲起石上隨風自飄揚忽然山雨過小忩明夕陽幽蘭氷雪凍不死深林還自芳獨醒人尚逺回首楚天長約客不至佳期成不信汗漫復誰招獨立殘陽盡天風鶴駕遙西齊秋夜晚雨過江城西齊秋氣清夢回孤枕上無處不蟲聲秋夕有懷顔色入遐想方知山水遙音書久不至一鴈度層霄壺天所作蘭石手卷靜依蒼石底幽夢繞瀟湘故畹歸何日飄蕭瘦影長畫梅夜雪莫能到晴蜂那可來一枝橫尺素獨占四時開有懷之子寧親去北風江路長水邊成獨立一鳥度殘陽山中居山雖無井接竹引清冷絶勝公侯家銀瓶牽素綆秋夕孤館燈初暗虛忩月正明寒衣猶未補風遞搗砧聲詠梅疏花猶在眼長憶倚闌看便欲攜笻去北風天正寒早行三首宿雨未開霽雞聲來逺空山川遙莫辨但覺水生風拂曙駕柔櫓溪山行幾重雲昏不見寺依約但聞鐘夜雨已滑道曉雲猶隱山不須牽百丈搖過沈塘灣蘭四首靈均不可見令我憶瀟湘獨步空林下滿身風露香草長欲無地國香終有根一花才破萼蜂蝶盡棼棼穿雲采清芬竟日不盈把凍雨灑輕塵飈輪幾時下風葉美無度露花何萎㽔樵人不到處抱石弄幽姿松雪翁所作躑躅花畫眉手卷春禽弄幽囀躑躅亞枝紅想愛風光好爭知桃李空清溪獨釣圖風急黃蘆晚天寒溪水清苔磯成獨坐應抱羡魚情訪友不值日轉北忩陰禽聲午院深幽人入鄽去不道客來尋友蘭欲識古君子楚花吾友于因懷蕭散志詩酒老江湖賈浪仙忍飢猶覓句每憶賈長江逆旅寒侵骨愁眠雪滿忩水仙月下弄瑶瑟雲間吹玉簫凌波引微步翠帶影飄搖梅竹圖花魁何崢嶸竹君自檀欒無心競春華氷雪了嵗寒梅花便面景寒苔作衣香冷玉為骨夢斷湖水濵盈盈蟾兔窟吳泰伯祠遺廟荒城裏開扉對碧流寂寥千古上豈獨數巢由春申君廟古木鳴鴉集遙山落日明盡知崇廟食不為祀朱英春興三首禽聲侵晝寂栁影向風斜苔淨無塵跡飛來何處花野岸水初緑孤城山更青羣鴉亂朝日木杪見殘星疏疏度寒雨淡淡作輕陰數片杏花落一池春水深鳩困雨寂無聲深栖夢不驚朝來晴色好飛並屋頭鳴清明春日閶門路惟聞哭墓田茅檐插楊栁墟落起新煙雨後小園春雨後碧草弄輕寒花片無煩掃新泥尚未乾獨立獨立風埃外幽觀桃李春青山久知我天地一閒人水仙明月照湘浦翩然凌素波花鈿朗珂雪裙帶舞青羅黃葵金杯傾玉露借問為誰乾徒引閒蜂蝶棼棼滿畫闌海棠胭脂作紅豔獨立弄春妍雖未成遐舉飄飄骨欲仙萱草叢葆搖新緑偏宜樹北堂無花亦小草何事有憂忘題郭天錫畫山水窠木二首疊嶂無重數茅茨有幾家杖藜人寂歷流水小橋斜春風吹不醒塵世豈知名未化牛羊去空山獨老成六言絶句冬夕二首繁草霜嚴緑減疏星雲盡光寒城頭一聲畫角月落烏啼夜闌庭樹風鳴槭槭佛燈院靜熒熒翛然面壁孤坐頓覺心如水清漁者輕刀泛入蒼茫釣絲與興俱長幾畨荻花深處枕蓑獨卧斜陽山水山中似有幽徑水面全無落花欲覓青城道士不知何處煙霞蘇臺晚眺斷岸人家高樹層巒寺塔殘陽江帆不徐不疾逺影天末悠揚福嚴即事村邊幾株紅樹屋外四面青山終日無人能到孤雲薄暮飛還秋江釣月圖遙村煙樹依微獨釣漁翁未歸雨過長江新霽秋空月滿荷衣墨竹龍孫抱節落落鳯尾弄影亭亭夜半撼牀雷雨翻身直上青冥七言絶句春晚登蘇臺二首春城草滿緑委蛇牢落殘陽牧馬嘶悵望胥門橋下水如何流出越來溪姑蘇臺下百花洲一度春來一度遊吳越興亡無限事栁風桃雨不禁愁經庸叟禪師舊房蒼松古柏冷蕭疏日照回廊雨過初白髮老僧今不見舊房留得别人居贈虞秀才西蜀東吳一水通可憐萬里劇飄蓬如今老闕一湖上應有鄉山入夢中聞有人歸自東州以四絶寄之怊悵韶華去不回檻前猶見杜鵑開松陵舊寺知歸久何事經年無信來若耶溪畔雲門寺賀監湖邊夏禹祠聞說春遊渾欲遍錦囊應是有新詩南北相思餘百里夜深清夢亦迢迢長懷落日秋江上共看風帆立寺橋短髮星星迫四旬背時贏得作閒人白雲青嶂堪投老終不持竿釣渭濱寄西峯隱者煙雲出沒弄晴碧中有幽人抱禪寂夜半嵓間風雨來松花吹滿蒼苔石病叟鬢毛垂雪病經年終日呻吟更可憐見說有時天氣好倩人扶出卧房前巳未夏日雜興六首雨過槐陰作嫩涼風回苔徑楝花香閉門寂寂臨書卷啼鳥聲中日正長深紅淡白巳隨塵斜雨橫風送却春池上偶來閒照影霜花吹入鬢毛新落盡紅芳見緑陰小橋流水雨餘深市樓橫笛誰家子吹得殘陽下逺岑纎纎碧草與階齊濃緑陰中杜宇啼花院晝長聽正好帶聲飛過粉牆西中庭日午橘花開蜂蝶何知故故來一陳南薰生殿角亂飄香雪㸃蒼苔榴花灼灼欲燒空白晝閒看似夢中鄰叟為耽顔色好殷勤指㸃與兒童春興五首雨細風柔栁帶輕畫檐乾鵲送春聲故人只在三湘住此去三湘有幾程朔鴈初歸花欲妍江雲淡淡晚晴天因思剪燭山忩夜香盡雕盤尚未眠慘别河橋記往年江城幾夜月空圓錦鱗只說吞香餌誰把音書腹內傳三月江南春日長栁隂亭院午風涼離懷漠漠深於海燕子飛來語畫梁長日愔愔掩竹房短歌多是詠滄浪階前漫種忘憂草逗到憂來不可忘送人之匡山鴈門不作宗雷逺白社年來況寂寥唯有匡廬峯頂月夜深還照虎溪橋觀鳯兒花有作殷勤栽得鳯兒花留鄉閒中玩物華不是松根有餘地秋光都屬别人家感舊風雨蕭蕭送暮春百花開盡草如茵畫梁塵鎖簾垂地燕子歸來不見人廢居當年聞說向天涯回首人間事巳賒庭院日長無客到東風吹落碧桃花風雨風雨蕭蕭獨閉門舊交零落幾人存春來草長迷行路巖壑唯聞虎豹尊明皇幸蜀圖鳥道橫空翠色新峽猿啼雨客沾巾豈知豔骨歸黃壤回首河山又屬人題畫卷倦行下馬憩嵓中服矢韜弓望過鴻不是陽坡新草緑豈知沙漠有春風三高祠三首越國謀臣吳國讎如何廟食此江頭扁舟載得蛾眉後却在三江汗漫遊季鷹倦作東曹掾千里思歸獨向東鱸膾蓴羮暫時事不知塵世幾秋風聞說松陵此度過長虹偃蹇卧晴波往來不見天隨子落日西風有櫂歌題闕東風吹散雜華雲猶㸃青燈過夜分山雨滿忩人寂寂不知誰此禮茅君晚望天外晴山擁翠螺幾家住屋近官河吳江四月春歸盡楊栁青青燕子多孤雲倦跡何心化白衣澗陰松頂漫孤飛縱然風度它山去清影依然在翠微鶴林寺用唐李頻韻二首青鞋步入翠微間松竹蕭森滿舊山不識史君仙去後有誰來此伴僧閒松門窈窕日遲遲坐久寒生古竹枝黃鶴不來山欲老白雲零落野風吹息齊居士墨竹一枝橫偃剡溪藤峙鳯停鸞總未能只恐夜忩風葉響定中驚起寂寥僧寄嵓栖翁五首霜髭碧眼老頭陀陋巷曽經幾度過連月不來城裏住只緣城外好山多聞師疇昔裂儒冠選佛爭知勝選官從此白雲投老去夜深無夢到長安千載祖師埋玉地萬松搖動暮濤寒不知月到髙峯頂瘦倚枯藤誰共看白髮山翁歸舊山石牀終日伴雲閒有時放鶴穿林去自有清風為掩關行腳歸來七十春此生贏得作閒人摩挲老眼山忩底冷看青天鳥過頻子固墨蕙百畝羅生未足多數花一幹自婆娑香名不入離騷卷爭得僧騫楚調歌聞角曉角吹霜海月斜一聲幽夢斷天涯自非慣作沙場客誰向風前不憶家友人訪宿雨滿空山風滿樓故人相過且遲留此生不作江湖夢莫向燈前話舊遊哀修上人門外逺山青歷歷忩前修竹緑依依夜深明月照空壁雲滿石牀人不歸松雪道人畫水村山崦圖西崦東村景象幽菰蒲深處有漁舟道人不惜毫端力畫我滄江伴白鷗琵琶行圖琵琶清夜動方舟碧葦丹楓兩岸秋何事江州白司馬尊前聽徹淚橫流栁枝詞二首幾樹和煙弄曉晴黃鸝飛上試春聲離人豈是無心折自到風前折不成愁月悲風汴水湄舞腰猶學楚宫時柔條繫得行人住陌上古今無别離過林逸人次韻巖栖翁花邊曾醉少年春白首相過不厭貧近說漢家徵詔急西山猶有卧雲人梅花次韻三首盈盈粲美並溪湄高謝羣芳保令姿既有咸平香影句不須重聽鬼仙詞草棘藂中寄此身倚闌猶憶去年春枝頭但有黃昏月冷蕊疏花亦可人挺挺孤標畫不成倚風凝睇更含情無端夜半高樓笛吹出江城花落聲訪人不值竹下開門對逺山松聲草色滿忩間想應采藥前峯去花鳥留連未得還桃塢閒步欲寫閒情步水濵杖藜扶我自由身相逢盡是看花者白首重來有幾人江天晚霽圖擔簦野老尋茅店雲擁招提樹插天孤舟泊處白日晚目極萬里蒼江烟感事覆雨翻雲事可哀交情誰是舊陳雷夕陽滿地無人見獨立風前看落梅曉逢山村先生錢唐吳苑三百里兩地相思恰五年今日河橋重相見全家盡載溧陽船送人之金陵二首淮甸風高木落時逺遊瓶錫自相隨爭知百折羊腸路不似長江波浪危清遊莫憚路岐賒但有雲山即是家此去鳯凰明月夜西風腸斷後庭花貽周山人次韻子封先生重峯疊嶂四回環卜得佳城紫翠間壟樹未高金碗出游魂夜夜哭空山晚興浮圖寒聳碧崔嵬煙雨冥濛晚不開深殿巳燈門欲閉松頭巢鶴未歸來感舊三首昔年曽此寄瓶盂竟日蕭然一事無幾度小忩人不到擁書閒對石菖蒲樓閣嵯峨矗太虛又攜巾舄託幽居娟娟翠竹凋傷盡好句無由節下書古柏槎牙滿翠苔中庭誰見昔人栽無情嵗月如流水日倚吟身得幾回畫馬霜蹄曾蹴河冰裂老齒貫嚼天山雪圉人何事相羈縻不得沙場流汗血寄友生霜餘紅葉遍階前漠漠陰雲小雪天老至不禁離别恨屋梁月滿思悠然詠梅三首屈鐵虬枝帶蘚枯想應曾識老林逋清標幸是從來瘦月冷霜寒影更孤水邊寒影竹邊身寫入霜縑意更真羌笛不吹花亦落一枝先寄隴頭人斗轉河橫月落時呦呦悲角五更吹分明一枕羅浮夢只許杖頭翠羽知訪無照不值童子開門日巳晡隔牆寒木聚啼烏杖藜不識遊何處閒却經忩火一爐冬曉城角鳴烏天送曙苔階夜冷蛬無語梅花帳底夢初回殘月半忩四檐雨桃塢口占桃塢春風花正開粼粼野水抱城回小橋行過聞雞犬應訝漁郎入洞來雨中寄無功自從杖笠歸來後竹院頻過話舊時一日風雨不相就相思渾似未歸時春牧圖閒依古木支笻立短褐蕭然滿面埃只道清流堪飲犢豈知洗耳有人來觀梅次韻無照孤根潦倒倚空山猶保疏花草棘間游子見來心獨醉滿身風露不知還車溪道中二首葦白茒黃溪水清倚篷閒看浪漚輕板橋橫處人家小修竹參天落照明客裏蹉跎嵗欲闌水邊楊栁尚平安夜來巳作還鄉夢滿目西風客櫂寒水仙金盞誰將置玉盤仙人掌上露漙漙想應未得凌波去自向階前弄曉寒湘江夜泊圖斷雨殘雲藝未收風翻雪浪打蘭舟無因住近湘江岸一夜猿聲動客愁九日行向東籬日欲斜意多世短感年華王𢎞不送陶潛酒黃菊還開九日花送人歸馬跡羈心幾夜怯啼螿旅夢驚回尚異鄉今日束書歸舊隱太湖煙浪正茫茫春暮雜興六首草滿池塘絮不飛人間回首巳春歸日長獨倚闌干角閒看晴雲度翠微緑樹童童映短牆暮雲霮䨴北風涼閒房竟日無來客自對空王禮夜香匣內青琴久折絃不將遺譜覔人傳莊生漫說成虧事琴到無絃韻始全筠帚休將掃落紅落紅多在翠苔中留連春色無多日過了東風是凱風北走京江南具區歸來庭樹巳扶疏百年浮世誰非客閒却牀頭一架書脈脈輕寒透夾衣東風一夜老薔薇杜鵑聲裏青春盡多少天涯人未歸次韻答人見問潦倒何堪繼祖燈傳衣終是有盧能閒身未得歸嵓壑聊作人間粥飯僧宿報恩寺凄涼塔廟幾經春往事重思跡巳陳夜半夢回禪榻上不知曾是寺中人奉寄山村先生江國霜寒木葉飛水深雲窅思依依多年不見先生面夜夜林問望少微雲屋山人久别承寄以詩甚慰仰思謹次韻以謝且堅隱操月落城空鶴倦飛密雲深樹靜相依閶門北去山如畫有日同師步翠微夏日即事庭樹森沈晚色濃修修寒雨滿疏鐘白雲一片歸飛急知宿城南若箇峯懷南游者故人别我南游去又見階前春草長故人不來春草死空勞一日九回腸郊行次韻無功郭西春曉宿煙開野色山光撲面來無限城中車馬客有誰著眼到江梅次韻山村先生八首倦行山徑倚長松斷碣眠莎古蘚封只見亂雅爭樹宿不知殘日在遙峯緑楊深處畫橋橫風掠平湖碧浪生待得笙歌城郭去苧袍笻竹自閒行密掩重門夜不開銅瓶斜浸蚤紅梅琴聲透出寒堂外引得鄰僧入坐來驛亭楓樹著霜紅天際冥冥見斷鴻隔岸逺山青更好淡煙斜日值秋風安行何必假籃輿竹下松間信所如我亦自知非叔夜賓朋滿目懶移書白雪堆頭瘦影長是非榮辱總難量爭如倚箇青松樹閒看幽泉出澗忙靜夜橫經對短檠郡譙歷歷報寒更宿雲去盡江天曉紅葉階前月尚明緑綺無絃獨賦詩正音雖在懶求知㑹當結屋孤峯頂卧聽行人話嶺危尋梅寒霧才收霽色浮杖藜徐步繞嵓幽草深不見梅花樹浩浩雲山叫鵓鳩幽蘭三首夢魂長繞楚江濱却向幽崖見似人春意未深花未落莫教輕汚馬蹄塵九畹荒涼跡巳陳眼中蕭艾自紛紛國香不解傳芳事浮世何人憶楚魂積雪堅冰凍不摧春風才至即花開纎纎緑葉無人佩空散幽香滿草萊舟中三首栁牙桑眼巳俱生極目春田尚未耕紗帽繭衣船上坐翛然如在畫中行青山路轉見紅樓鵝鴨紛紛古渡頭風雨滿天遮望眼不知何處是杭州桑鳩夫婦晚相呼天末羣山乍有無老大却思探勝槩短篷風雨過西湖和靖先生墓處士梅花春尚開湖陰不見鶴飛回青山盡日陪歌笑桂酒何曾及夜臺湖上緑雲紅錦兩俱銷急管繁絃滿六橋向晚畫舟沙岸泊鷺鷥梯浪影迢迢孤山法師塔身藏陶器見遺文千載孤高獨有君靈塔尚餘湖水曲梅花紅白自春雲寓大青蓮寺聽惠因寺鐘樓中遙見玉岑峯幾夜閒房得暫容我巳青蓮來假榻如何猶聽玉岑鐘南高峯頂望越山閒扶翠竹上岧嶢野日荒荒碧海遙隔岸越山才咫尺片帆不得渡春潮暮春雜興十二首野水浮來半落紅不須惆悵怨東風春歸畢竟歸何處還在溪光栁影中門掩東風栁色深暮寒脈脈透衣襟春天最是無馮凖一日才晴一日陰巖房深掩淨無埃書卷終朝亦懶開不是春風苦多事栁花爭得入忩來春雲迢遞覆重城風約雲開漏月明夜半小庭閒獨立鐘聲才斷又蛙聲花殘片片隨流去絮落濛濛撲面來燕子不知春寂寞緑楊陰裏自飛回雨入孤城草木新香紅半逐馬蹄塵却憐杜宇無情甚不解迎春祇送春為愛西園水石幽日斜猶並小池頭不知何處楊花落一㸃飛來一㸃愁公子金衣映日黃却來忩外囀圓吭宫花未落春猶在蚤巳無心入建章老去身心豈惜春但傷泥汚落花新清陰滿地韶光逺猶折疏麻問水濱天際孤雲尚未還青童爭敢掩柴關近緣壞堞摧春雨得見城西幾尺山春光欲老緑陰寒稚筍攙空巳作竿無限好山都不見亂雲斜雨滿闌干紅藥花開春欲歸緑楊陰暗燕爭飛晚來一陳東風雨又送餘寒上客衣廢冢泉臺初掩巳茫然況是經今又幾年金玉不知誰發去石人空倚斷碑眠寄如鏡師三首風雨青燈夜對牀月團曾試竹爐湯無因移並臯橋住不得同師上講堂緑琴欲奏聽人稀掃地焚香且掩扉春色坐看風雨盡繚垣重疊長苔衣稠緑疏紅映短垣斷雲零雨暗西園日長吟罷無餘事卧聽松櫩鳥雀喧陽鳥白草黃雲紫塞長夢回荒磧思凄涼秋來度得江南岸何處西風無稻粱四皓圖商嶺誰知遁跡時紛紛古雪滿鬚眉日長深谷無人到卧石依松詠紫芝心山為羽士賦悄無形影難鑽仰極目撐空如許髙坐向松根讀黃老不知松露滴仙袍書舊吳箋石湖景後風艇曽維野岸濵山光漠漠水粼粼如今閒向魚箋見花栁亭臺是舊春萬里江山圖巴水沄沄巴峽青月明客淚墮猿聲眼中巳識瞿唐路剩水殘山懶問名西齊即事亂鴉歸樹夕陽明識面江山隔壞城住處祇緣閶闔近忩間時有馬蹄聲秋興二首閒向空庭步緑莎夜深人靜月明多秋風陳陳吹黃葉試問秋風奈樹何幾夜西風葉滿苔燕巢空在鎖塵埃秋歸莫折黃花贈逗到明年又再來首夏偶成絺衣欲試寒猶在舜操將彈調未成春色不知何日去絮飛花落總關情秋江待渡圖客路悠悠思渺然滿林黃葉滿村煙秋江正晚人爭渡莫把閒心待渡船龎德公騶從何煩到白雲戔戔束帛賁丘園使君迫我今為甚更挈妻兒遁鹿門孟浩然北闕無心更上書病多偏訝故人疏非熊不入君王夢自把長竿且釣魚李太白别夢休論隔幾塵尊前一笑即相親時人欲識天才妙試問山陰賀季真杜少陵江漢悠悠萬里客乾坤莽莽一沙鷗干戈未息長安逺白髮相看有蜀州漫成二首陶潛但愛杯中物杜預偏憐身後名世上不須論得失豈知千古有高情盡將嵗月付逍遙我亦何心問豆苗谷底白駒如可縶雲中黃鵠始堪招宿東塔寺二首閒向僧房看白桃客忩對榻有同袍夜深人靜鐘初定卧聽風鈴語月高小雨輕風作莫寒香紅亂落滿闌干青山近隔人煙外高閣閒登得自看致道觀窈窱殊庭曉獨過犬聲迎客出煙蘿朱扉半掩春風定撲撲松花落轉多舟中帆輕風熟雨霏微野岸春融燕子飛昨夜江橋緣水宿滿天華月倍思歸送虞待制還翰苑二首臘盡江南野色寒貂裘獨擁上征鞍春風二月中州路一片鄉心兩處安翰苑仙人冰玉姿久聞滄海掣鯨鯢自言夜半螭頭下禁漏聲中月已西馬三首風騣霧鬛四蹄輕汗血講珠眼鏡明棧豆豈淹千里志望雲時復一長鳴臆若雙鳬首渴烏嵯峨駿骨世間無天間老我堪終惠腸斷秋風苜蓿枯雄姿猛氣真龍種隅目晶熒老陳雲玉鐙金鞍被來好滿身散作五花文蒲萄手卷枯莖偃蹇葉參差繁實羅生影倒垂記得去年新摘夜秋風山館月明時春夜雜興十八首幾夜春寒入楮衾夢中猶或動微吟孤城月落江天暗燈火青熒小院深自是疏慵懶出門非關性僻厭趨奔地偏少得人來到苔徑全無屐齒痕莫作參差鸞鳯聲俗緣深重道難成龍腰鶴背非無力自是先生肉未輕白首人間何所求百年起滅一浮漚中流兩岸俱無滯到海還應不繫舟隟中野馬飛無定空際毛輪色轉新但得蔗漿消宿酒不知誰是醉中人淨室常空北海尊新詩縱得與誰論不須竹下開三徑自鄉松頭學卧雲東洛相歡嵗月多逺遊一夕負岷峨當時不鄉荆門去月下誰聞扣角歌由來老病為良藥藥病兼忘自在人江上一犂新雨足鵓鳩聲裏栁條春花夢初寒尚未醒眼中先見栁梢青山行未卜誰為伴卧向西齊看畫屏朴散醇漓少古風儀秦鼓舌可爭雄攫金逐鹿皆能事誰識羊裘負擔翁昨夜三更夢大刀曉隨歸思度春潮高飛未必逢矰繳湘水湘山恨不銷寒生細戶雨絲絲開過瓶梅未有詩碧樹飛來何處鳥一聲聲是怨春遲琴水清遊巳隔年夢中泉石尚依然白龍祠下藤千丈倚樹拏雲欲上天京口歸來嵗月賒杖藜猶憶訪煙霞何時再到龍游寺閒看江豚出浪花春入蓴江長緑波白鷗飛處舊曾過半山落日長橋外沙岸漁舟曬網多膠峯老宿歸應久許我笻枝未寄來尊者若能歸掌握水邊松下共徘徊尊者竹名夜雪霏霏落瓦溝冒寒乘興上孤舟當時若使見安道誰說山陰有勝遊辨才巳老猶臨帖子美雖貧不廢詩最是世間清勝事此中風味少人知贈别斷蓬落葉易西東聚散由來古昔同一夜寒螿啼到曉聲聲都是怨秋風寄無功平生落落少相知地近情親僅有師來往風流如昨日相看今巳鬢成絲月夜淅淅涼風熟稻天星河明潤夜蕭然固知月色難長好終有砧聲似往年詠竹雪老氷枯草木衰石根搖影自萎㽔無心去作中郎笛何況凌雲化葛陂子固墨梅王孫骨朽渺難追千古終無兩補之應恨楚騷成脫略自將霜楮寫橫枝春日雨中至福嚴精舍春泥路滑轎行遲滿目青山總是詩兩度入山皆過雨未知何日值晴時陽山道中二首泰定甲子二月初九日余與友人圓大虎游陽山北阜過尊相寺聞有禪者縛屋峯頂遂捫蘿而上至雲泉亭掬而飲焉甘涼可啜得禪者於石室中為余相勞苦煮茗為供既而語散殘陽巳掛樹梢矣因以二絶紀之一掬雲泉潄齒涼小亭幽絶背山陽道人自向峯頭住閉户不知春日長雨餘春澗水爭分野雉雙飛過古墳眼見人家住深塢梅花繞屋不開門春日雜興八首院栁亭亭翠掃空夕陽淡淡照東風梅花零落無心問愁絶鶯聲到枕中野塘風緊漲漣漪桃李春寒發尚遲山色晚晴青不了倚笻忘却立多時湘雲碎剪作春衣步入青山映夕暉我巳無心事漁獵野禽何事亦驚飛惻惻輕寒剪剪風白雲飛盡小庭空曉來誰展元暉畫一簇春山細雨中閒房深掩靜無譁石䂪濃煎飯後茶但見玉英飛滿地不知何處落來花清明漸近緑楊柔刺水蒲牙蚤巳稠沙上晚來風景好鳬鷖相逐自沈浮獨卧深雲靜掩關四圍修竹滿忩山橋危路險無人到唯有孤雲自往還莫見飛花但惜春豈知老却夢中身一聲杜宇來深樹愁絶天涯淪落人讀史龍輿逺幸路間關扈從言歸豈等閒西內南宫雖不異上皇何日得開顔夜思夢鵲驚飛叫不休聲聲還繞舊枝頭牆東一片梨花月又逐笙歌上水樓漫興四首夢裏生涯事萬殊覺來莫道世間無薰風長得連天草滿目秋風草又枯一枝新桂偃蟾宫出入常存掌握中赫赫炎炎能幾日到頭終是有秋風貧富由來不兩岐古今何事少人知但令海內無貧者始信人間有富兒巳將身世付悠悠枕石眠莎俱自由世上盡知騎馬貴不知誰肯學騎牛夜雨寒燈孤館夜迢迢斜雨敲忩轉寂寥惆悵東風空自惡不吹明月上花梢偶成二首紙閣餘寒去尚遲淡雲香雨苦催詩無知草木猶春色老石蒼蒼只舊姿兩兩鳴鳩報曉晴病資藥物遇清明有時步出長廊下童子唯尋拄杖聲秋夕獨坐木葉蕭蕭夜向深寂寥燈下百年心雨昏不見沉西月繞屋秋風何處砧答白雲見寄四首泰定甲子嵗二月初二日豫與諸公送白雲間赴陽山福嚴精舍翻閲藏教然影不出山者三年始可訖事豫時與之言别因謂白雲巖桂花開又當候豫於此天及秋豫以書經不果往雲以二詩見促遂倚韻答之巾瓶欣得寓煙霞繞屋青山引貫花早晚杖藜終赴約夜牀毋惜建溪茶駒隙光陰信有涯遁身嵓壑似蓮花篆烟裊碧經初夢童子開簾巳送茶山院秋風丹桂開同人訝我未能來豈知自寫金仙教終日閒門掩緑苔閶闔門西帆曉開我儂猶憶送君來想應舊日曽行跡荒落鳴蟲半是苔過如鏡師房寒竹蒼蒼菜滿園西風黃葉擁籬根不知杖屨歸何日巳有詩人來打門擬塞上曲二首金笳叫月夜將分萬馬羣嘶徹陳雲戍卒半成邊地土麒麟閣上畫將軍漠漠黃雲關塞秋邊人八月擁貂裘偶來飲馬長城下沙底泉清見髑髏次人病中韻卷衣力疾度淮河鄉路迢遙旅思多歸到秋城舊茒屋日長敧枕擬隂何紅白梅花同瓶粉面桃腮一種芳淨瓶斜插獻空王晚蜂亂觸西忩紙為愛寒香滿竹房秋夕鮮鮮涼月滿幽軒階下蟲嗚草露繁夜半秋風入庭樹夢中任作海濤翻送人歸杭涼稻翻風江欲寒新鴻尚隔楚雲端一輪皎潔西湖月好去松根石上看青塘舟中夕陽川上樹交加碧影沈沈遍水涯村路不知行幾曲扁舟但覺往來賒宿西靈寺夜堂燈暗亂蟲鳴深月何心隔牖明蝴蝶夢回歸思作畫樓時送曉鐘聲栁枝詞西閶門外多楊栁寄語休將伐作薪雖是年年苦攀折也勝徒手送行人念昔游次韻裋褐蕭然兩鬢疏閉門終日卧于于有時夢逐𤣥真子箬笠蓑衣釣太湖池亭即事次韻山村先生二首赤鱗同隊戲漣漪坐上春風颭翠帷何事秋來見蝴蝶翩翾多在鞠花枝櫩前嘉木減春華贏得殘陽映碧紗漫說楚蘭堪作佩秋風滿目不開花冬日偶成三首清霜欲重小春天楊栁蕭疏帶曉煙無奈東皇苦多事又傳春信到梅邊北風吹水日銜山㸃㸃飛烏接翅還陌上櫂歌聲不斷樓頭新月一梳彎東林送客白猿啼猶憶童年誦此詩今日凄涼身已老風前聽徹不勝悲感舊二首緑楊蕭瑟颭秋風客去門閒酒盞空夜半月明生綺席不知誰在畫樓中門外無人繫紫騮夕陽殘栁尚風流想應愛客心還在不得尊前共白頭芍藥金鴉出海曙光寒緑萼紅苞露未乾溱洧有人堪折贈廣陵無使到長安松徑謖謖清飈拂曙鳴杖藜徐步介然平哦詩不覺衣巾濕元是鶴巢仙露傾介音戛元貞初余留報恩寺嘗手植四樹於庭特毫髮耳自徙居於此往來凡三十餘年今樹巳各環人臂豫不得不老矣遂賦二絶焉初從毫髮移來種倚檻閒看過屋長不是地靈能愛惜肯教千載作隂涼此地無心夢大刀每來多是訪同袍如何不使閒身老樹巳庭中若許高題劉商所作觀奕圖塵世清閒從古少山林嵗月自來多蕭然一局青松下能使樵人爛斧柯寄如鏡師五首西園常憶共登臨此日回頭嵗月深只有緑琴堪寫恨冰絲零落素塵侵竹房荒圮尚為鄰清話何時對故人想得東風三月莫青鞋自踏小園春春風庭院雪初消僕老猶能拾墮樵九節菖蒲卷石上白頭相對長新苗松間清坐隔凡塵階下神芝五色新侍立小童溫似玉抱琴終日自相親題師畫像也古塔星燈耿泬寥數行歸鴈度層霄石爐香燼琴初罷百尺松頭月正高曉行至長安堰往往有力者先過因而濡滯久之過壩始知饒有力居間終是讓無營縱然夜宿長安鎮明日扁舟入鳯城橫山道中野外霜晴盡刈禾夕陽紅處亂山多筍輿幾度穿林過時有驚禽出薜蘿解嘲人人盡說虞公死我亦雖聞獨未然今古世情淪好惡豈知禍福本由天後赤壁圖眼中風物舊曽過嵗月重遊復幾何長嘯一聲天上去月明千古屬江波晴雪圖遙峰引睇白紛紛高樹鳴禽總不聞夜半江風應更急好維舟楫醉芳尊送王仲通歸大名五首端淳遺逸逝波傾君老猶能記姓名餘澤未衰光耀逺子孫多得值文明苧袍練練映烏靴鏡裏光陰鬢己皤莫訝名門鄉黨敬豈知雙眼識人多五十餘年湖海心青雲多是舊知音一官為老炎方久鄉路時時夢裏尋雙眸曽向野人青寰宇相逢水上萍書劍北歸聲問逺月明何處認文星客囊金盡䇿歸驂眼老吳雲雪半篸蘭玉滿庭朱紫貴夜忩風雨話江南梅花相思羅浮山月滿苔枝翠羽雙雙欲下遲千古天教長㑹合世人那說是相思暮春雜興十首野水孤城緑樹新東風門巷雨如塵人生自是多離别白首哦詩又送春世事時時到眼新鶴長鳬短總成塵平生願學匡山逺息影林間更幾春老至衰顔鏡裏新田衣不染六街塵豈知尚有閒忙在清曉濡毫賦駐春滿地柳陰野水新粉牆額額有凝塵一雙戲蝶來書幌猶繞殘花覓舊春游子翩翩白紵新花驄緩勒步香塵緑忩書卷無心問柏酒樓前醉好春富貴人家第宅新芳庭徐步不沾塵田園纍重煩征賦豈有閒情問賞春四月秧針刺水新村莊兒女滿衣塵辛勤但了耕桑事雙眼何曽解識春折得朱櫻擬薦新像前先拂几間塵書燈的的含光永萬古山房不夜春好客相過語笑新偶逢凡俗眼中塵漫將甲子從頭數白髮無成五十春失喜朝來得句新篇成惟恐染凡塵自收草具藏筠篋且啜花瓷雪乳春春字十絶無功巳嘗見和子虛諸公亦䝉見和遂復用元韻為詩十首答之眼驚篇什思清新錦繡心腸語不塵好跨玉龍遊汗漫朗吟閒看十洲春景入清和天氣新燕穿簾幕墮梁塵莫言四月芳菲盡猶有孤花為表春移家青犢小車新輕輾長衢影絶塵幸有山妻帶雞狗仙翁頭白不勝春時事驚心笑屢新剛腸難詘倦隨塵平生竹葉元無分老貌雖紅不是春江工晴山螺髻新蒼龍觀闕久埃塵美人自去為雲雨三十六宫瑶草春憶作山中雨霽新緑陰羃羃步無塵歸來靜掩薰風户李白桃紅夢裏春溪藤書罷墨痕新棐淨忩明絶㸃塵閒對佳賓捉松柄清談四坐可回春數聲烏舅曉來新回首韶光隔幾塵漫說壺中天地别豈知猶有武陵春無纍無營鶴髮新錐刀利祿等浮塵榮枯付與閒花草老幹隈嵓冷笑春世夢紛紜幾度新沃焦落石海揚塵夷齊骨朽名還在嵗嵗年年薇蕨春再以前韻寄無功五首緑綺初調絃索新晝長松户淨無塵蒼苔滿地無來客妙指能回萬古春汲古工夫計日新豈堪無事踏黃塵鬢毛白盡眉毛白老伴無多好惜春相逢傾蓋白頭新此道今人委路塵來往風流成二老矮忩清對話殘春風俗年來日日新莫將心地涴清塵橫翔斗上皆餘事共樂林間未老春識浪幽觀不住新豈知影象鏡中塵頂門迸出摩尼眼優鉢花開世外春西郊初夏拂拂薰風燕語新路無車馬動芳塵莫言水國韶光盡野店槽牀别有春吳山寺碧瓦鱗鱗梁棟新世尊前殿尚䝉塵槎牙老樹空庭下卧看行人不記春寶帶橋晚興徙倚江橋野興新半山落日雨清塵如何南北舟中客水宿風餐過却春以上三首和前人李遵道畫枯木竹石老幹崝巆立天壤河漢悠悠無夢想幽篁石底淡相依應見馬犍摩背癢寄如鏡師二首靜極幽花有暗香靈禽語滑晝初長自言為愛三株樹又展忩西一帶牆雨後芳園蘚色濃落紅顛倒滿行蹤近來眼界緣空濶得見鄰牆幾樹松雪次韻子虛誰剪冰花散玉京夢回疏牖作空明豈知白首冥搜者敧枕迢迢聽漏聲遣興二首茫茫碧海尚揚塵落落蒼松合化薪若使金錢堪買命世間應更少閒人橫黃曳紫仕途遊寵辱驚心易白頭身後功名半張紙夢中生死一場愁次韻答無功見寄六首宇內無因遇子期匣琴絃斷亦多時夜牀燈火誰相對風雨勞君入夢思景薄桑榆良可愁江山如待倦追遊眼前事往皆成夢鏡裏徒添雪滿頭半生自分草茅居衣食隨緣豈願餘謁肆買書心巳懶栁橋槐市跡全疏瀛海飄零嵗月賒每觀落日即思家導師大願深於海終亦西池占一華南國多年傍水居且無魂夢適商於塵中趨競非吾事擁篲殘陽自掃除漆鬢霜侵曉鏡新敝袍勤拂舊埃塵瓦瓶分得松陵水石鼎先烹顧渚春竹石風葉刁騷弄晚涼影傳縑素豈聞香石根稚子才穿土蚤巳能齊老幹長詩餘臨江仙春暮燕子穿簾深院靜畫闌飛絮濛濛砌苔柔緑襯殘紅問春何處移在栁陰中老至十分詩思減膝間閒理絲桐曲終聲盡意無窮杜鵑開了餘恨寄南風浣溪沙初夏草滿天涯春已歸緑槐陰裏燕交飛一池寒水照薔薇枕上北風吹夜雨燈前西院打忩扉曉來人盡說添衣浣溪沙夏日簾捲薰風夏日長幽庭脈脈橘花香閒看稚子弄鶯簧四月雨涼思御夾三吳麥秀欲移秧不知身在水雲鄉卜算子秋夕夜月照西風露冷梧桐落揚子江頭朔鴈飛黃葛終難著促織弔青燈逺夢驚初覺擬撫忩間緑綺琴寂寞無絃索朝中措虎丘懷古芳塘水滿緑楊風臺殿隱朦朧幾度春來幽徑馬蹄踏碎殘紅寂寥廣坐塵埃漠漠客散堂空講石雨苔侵遍九原誰起生公菩薩蠻燈夕次韻當年老子逢佳節萬戶華燈連皓月和氣滿江城喧喧隊子行掩關聊共坐靜對沈香火一笑盡君歡閒心無兩般朝中措桃源圖桃源傳自武陵翁遙隔白雲中漫說人間無路豈知一棹能通紅英夾岸霞蒸逺近爛漫東風將謂仙家境别雞鳴狗吠還同憶王孫漁者悠悠世事幾時休身後身前豈足憂天地都來一釣舟下中流卧看青天飛白鷗憶王孫山居半生長是白雲間猿鳥漁樵共往還倚箇喬松看逺山少機關世上何人似我閒憶王孫有懷天涯芳草碧萋萋何事王孫去不歸城郭人民半已非信音稀幾度無言對落暉憶王孫詠栁一株閒傍灞陵橋斜倚東風學舞腰遊子尋春俊馬驕欲魂銷和雨和煙折翠條少年遊次韻頂中𤣥髮已成絲回首不如歸浪宕人間蹉跎嵗月清夢繞西池百年光景無多日七十古來稀物外閒身眼前塵事休把誤心期謁金門贈雕鑾匠天賦巧刻出都非草草浪跡江湖今欲老盡傳生活好萬物無非我造異質殊形皆妙游刃不因心眼到一時能事了谷響集卷三
