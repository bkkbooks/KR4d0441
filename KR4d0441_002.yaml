body:
  text: 谷響集卷二元釋善住撰七言律詩春杪登蘇臺獨上髙臺小憑闌荒城寂歷水雲寬連天芳草雨初霽滿地落花春又殘白髮不生還亦老青山無事且須看吳王伯業消磨盡江鳥呼風野樹寒秋江晚歸圖誰驅象管掃風煙野老攜笻古木邊山靄沈沈無過鳥江流泯泯有歸船家貧不畜栽花地力健還開種秫田辦得縣官秋賦足黃雞白酒樂豐年答人問次韻昔年曽事華陽君寵辱升沈總不聞雞犬得仙何足問刀圭餘藥可同分丘園自洽唐虞化枕席猶觀屈宋文門外輪蹄互馳突矮窗終日斷囂氛秋居為愛吟詩心獨苦每於人事少關情山林有道名還著㕓市無營迹自清黃葉蕭蕭孤館夢青燈耿耿百蟲聲一從栖息窮簷下包笠何曽浪出城送胡道士用唐賈島韻蘿徑春歸半是苔舊山無處不花開石房雲暖青牛卧琪樹月明黃鵠來萍點霞裾行雨罷血凝星劍斬蛟回篋中靈藥長存取莫使流年逝水催舟次盤門過無得院篷窗兀坐聽鳴蟬滿目隂雲欲雨天山隔壞城縣落日樹連荒驛帶蒼煙臨流石馬何年墓種竹人家有釣船至老相尋能幾度更揮青蓋訪林泉送無照入杭草白山青羣雁飛天寒日暮行人稀危帆側倒過絶岸巨浪突兀翻晴磯飛來峰頂猿聲急合澗橋邊月色微巳有梅花報春信地爐煨芋待君歸贈日本僧鯨波渺渺接遙空今古由來一葦通斗柄夜縣常辨比日輪朝湧始知東車書既混文無異爵服才分語不同鄉路眼中應已熟好攜包笠扣玄宗凌歊臺用許渾韻宋武南巡能幾回如何此地有髙臺濛濛野翠連山合漠漠江雲度水來輦路春深芳草暗宫牆日暖碧桃開殘碑一片無人讀土蝕沙埋卧緑苔遣興鏡中嵗月髮如霜拗折漁竿罷釣璜成我固知無鮑叔絶交幸得有嵇康江邊茆屋從風卷峴首苔碑任雨荒一炷栴檀數聲磬青燈影裏事空王寄巖栖翁白首雲棲掩竹扉山中消息到城稀老來間去交遊少病後經行氣力微野岸曉煙添柳色敗垣春雨長苔衣吟詩只益丹心苦擬挈筠籠共采薇次韻送劉鍊師還茅山鶴背風髙歸路難故山遙憶水雲寒青琴三疊笛三弄白飯一盂蔬一柈對客圍棋衣緩帶斬妖揮劒髮衝冠壺中日月雖無限誰信人間鬢易乾悼陳隱君端淳耆舊凋零盡今日傷心又到君身後有詩傳異域生前無子托斯文間門寂寂迷芳草古柳依依黯莫雲惆悵我來相吊罷庭花和淚落紛紛雅黔突蒼煙沐羽翰歸期頭白亦何難平疇亂落野風急髙樹爭啼壠日殘窺食引吭行屋角避人翻影起江干因思水宿孤舟夜敧枕候鳴霜月寒故里感事墟落荒涼竹樹空耕餐鑿飲古今同一聲鴻雁度寒雨兩岸蒹葭鳴夜風耆老問來多作鬼故交别後盡成翁雲山滿目愁無極浩浩溪流只鄉東送日上人還吳淞秋雲秋水雨悠悠白首何堪動别愁岱嶺月明寒鴈過楚江木落晚禾收夫差既賜申胥劒句踐難回范蠡舟今古興亡無限事願因歸路問沙鷗遣興少年心事付東流把鏡空驚雪滿頭蠻觸戰爭何足算雞蟲得失幾時休清砧敲碎吳臺月寒角吹殘越壘秋究竟自知身是客行藏何必倚危樓九日澤國西風物候殊此生能見幾榮枯漏天不與杜陵補濁酒誰資陶令沽眼對黃花聞蟋蟀首敧烏帽把茱萸年來巳減登臨興卧鄉松窗看畫圖送人還山茅茨拋在翠微間楖栗橫肩又獨還松樹别來巢鶴大銅瓶歸去蟄龍間西風黃葉埋寒徑落日青猿叫亂山後夜月明誰是伴枕前飛瀑響潺潺寄無照雅道交遊僅有君片雲遙隔斷知聞燈前緑酒難同醉屋外黃柑可共分唐老詩瓢浮草具永師茟甕瘞銘文滿懷風月還依舊好過街西與細論贈羽人霞珮星冠老葛洪何年飛下玉華宫石爐香冷易初罷山鶴睡醒琴未終好道每思超物表愛間長欲入壺中不知自别仙都後還見桃花幾度紅送人入杭尋弟及謁山村先生之子難忘骨肉情逺尋仲弟入杭城好山半向舟中看佳句多於枕上成驛路牛羊歸暮色江橋鼓角動秋聲端淳耆舊今無幾為問湖邊老淨名次韻奉酬嵓栖翁身世悠悠自可哀暫將懷抱鄉君開半生白雪無人聽幾夜青山入夢來竹院就荒愁見草水田經廢怯聞雷攜笻便欲相尋去行到松隂却又回寄人二首先生五十已開秩我輩政在不惑年萍水相逢何太晚藝窗對坐成華顛支公自放沖霄鶴嚴子方規賣卜錢莫待池魚長頭角便隨風雨上青天落魄東西但任緣舊房拋擲已多年行藏厭作出山草身世甘為上水船黃卷排籖常滿架緑琴挂壁久無絃不知入社將何日且要開池種白蓮與無照莫出西郊閶闔城邊煙草昏自攜禪侣過孤村隂雲垂地鳥歸樹寒色滿空人閉門山徑雨餘留虎迹野塘秋盡露潮痕一聲牧笛前峰起回首殘陽欲斷魂送松洲歸蘭陵衣囊結罷上歸舟腸斷江城雨不收年臘漸髙愁作客交朋雖好倦追遊水村逺近多鄉樹煙郭東西是别州此去故知南鴈盡相思能寄短書不過石湖十月吳皋霜露零田家收稻滿柴扄湖中浪擁銀花白天末山橫螺髻青寒色亂雅飛笠澤夕陽衰柳並旗亭何時覔得清遊伴更買扁舟過洞庭宿山寺用唐項斯韻步入松門行徑微秋燈隱隱見僧稀風生暗壑虎初過雲起寒潭龍已歸桂檻清泉當面落穿廊黃葉近人飛明朝又鄉它山去身外還存舊衲衣遣興寶書空掩滿塵埃縱有間情亦懶開壯志但隨白日過少年不逐青春回風波浮世誰長在雲雨交遊我獨哀更欲荷鉏嵓壑去種松栽菊自裴回桃花源詩孤光耿耿洞門斜只尺仙源去不賖流水豈能迷客路春風終是到田家山林影裏聞人語雞犬聲中得岸花相見毋煩問塵事且同尊酒醉煙霞懷北遊者芳草長亭路渺漫逺遊聞説過淮安相逢每歎同懷少一去那知會面難老鶴唳空松院靜夜燈照雨竹窗寒年來舊友皆流浪笑對青山獨倚闌登報恩寺閣髙閣間登四望寬青山極目倚雲端水村漠漠連天逺隴樹沈沈帶雨寒罷馬嘶風春草遍倦雅歸堞夕陽殘豈知大道平如掌今古人間行路難書友人壁獨坐虛窗晝眼明萬緣休罷一身輕石池水滿魚苗長花徑雲消鶴影清燈下逺書來越嶠枕中孤夢出江城自言野性如黃鵠日夕長縣碧漢情警墯次韻少小林泉學空寂不覺犀顱生二毛買山無資愧支遁升天有路付琴髙北上定愁燕地雪西遊終怯瞿唐濤牀頭三篾幸無恙束肚何須紫錦絛寄無及長老清才雅望屬明時在處人傳絶妙詞靜飲三杯松下酒間圍一局竹間棋花開古寺春生蚤潮落寒塘月上遲莫訝近來音問缺為因無路寄相思寄如鏡師露滌暄風寒氣催砌蛬號冷夜聲哀楓飄南國鱸魚上鞠發東籬鴻雁來髙閣晚山曽共看舊房秋徑未重開何時再剪西窗燭坐聽青琴走壑雷送人之金陵歌罷陽關酒一杯扁舟欲上更徘徊舒王舊宅為僧寺後主遺宫化劫灰北固山頭春雨過西津渡口莫潮回心間在處堪為客遮莫天涯杜宇催松陵道中五兩翻風彩鷁浮旅情詩思共悠悠霜迷古道晴猶滑氷合平湖曉不流隱約野田明白鳥凄涼江柳映紅樓故人只在炊煙外帶月侵星到即休傷報曉雞畫角聲銷欲曙天逺傳清唱到窗前殘燈獨客回春夢壞榻間僧起夜禪茅店霜寒登樹宿槿籬日暖踏花穿不知何處供盤箸空對筠籠為黯然悼耕雲禪師聞師久鄉峨隂住擬與將來建法幢半偈不留忙下世舊經空在伴秋窗雨荒新塔風吹草雲黯孤城月墮江行業未馮人紀述南宗弟子已心降靈嵓尋幽逺到千年寺行盡清隂見野桃羅綺成塵傷窈窕屬鏤凝血閔英豪雲生絶壁春山暗風起平湖夜浪髙暫向松根憩微倦滿身空翠濕征袍秋興青山木落見遙曽幾欲依栖去未能鍾阜固應回俗駕沃洲終合屬間僧柴門靜掩深秋雨月色寒侵午夜燈不涉世緣尤是分風雲何必羡鯤鵬送别友人用唐姚合韻逺到山家學采芝情深不覺忘歸時松敧老屋侵人近石礙流泉出澗遲峯影參差連草色禽聲窈窕隔花枝莫言書劔曽來此恐落間名四海知寄無照巾舄隨緣寓北山家林雖近亦忘還一簾草色清秋靜四壁蟲聲白晝間佳句但書幽石上逺峯多畫寢屏間嗟豫與爾同年齒落魄無成鬢欲斑書如鏡師壁銅龜塔下居來久種鞠栽松老嵗華無事幾曽離水石半生長是寄煙霞據梧靜聽空階雨策杖間看小苑花多少嵓間深隱者不知幽趣在君家悼巖栖翁欲卜幽栖尚未曽豈知今日别交朋霜鐘敲落故山月夜漏滴殘賔館燈原上又添青草塜社中不見白頭僧春風城郭還依舊緩步尋芳恨莫能舟中晚歸雨餘村聚暗桑麻問訊韶光去已賖野笛揭雲聲嫋嫋酒旗穿柳影斜斜荒原逺近多芳草幽澗東西盡落花巾錫又還城郭去卧敧篷底數歸鴉憶陳隱君幾載先生共往還杖藜今日斷松關苔封白骨琴尊逺月浸空齋研席間弟子未聞居墓左詩名長見在人間自言只憶蓮花國終不栖神鄉海山舟次江亭歸思悠悠極渺溟暫維舟楫並長亭春江水暖蒲牙白野岸煙銷柳眼青鳴犢帶聲登廢壠征鴻和影度遙汀不知何處吹霜角獨立天涯淚欲零次白提舉秋日與人泛吳淞韻秋風一舸共裴回日照川原宿霧開白鳥不知吳苑廢青山曽見越兵來清標拔俗元章字佳句驚人子美才我欲從行身莫遂幾畨吟上水邊臺次韻無及長老見寄退迹深居楚水濵愛間甘作卧雲人一身貧盡豈足道五字興來如有神江郭雨昏山色古柳橋風暖鳥聲春雖然不是鍾期耳世外偏將古調親虎丘春遊得花字新路委蛇半帶沙到來疑失舊煙霞鼓鐘才動水雲合絃管未終山日斜嵓閣雨晴生細草石池春漲有殘花小吳軒上聊馮檻古木隂隂噪亂鴉過無得院每説江湖倦往還却歸此地掩柴關舊栽修竹臨寒水更起回廊映逺山夜半蛙聲來枕上日髙松景上窗間有時間倚孤笻立覔得新詩自解顔月夜四首明河如練月如弓涼葉蕭蕭下逺空水國正秋無過雁苔階終夕有鳴蟲故人自隔關河外往信猶存篋笥中一盞青燈伴孤寂夢回吹殺破窗風漸老襟懷豈易寬強將詩句散愁端黃花開後重陽近白髮生來萬事難月夜獨眠松館靜晚天清坐竹窗寒暗塵鎖斷青琴索指甲雖存莫可彈鴈聲吹落五雲間帶月柴扉夜未關寒氣僅傷凡草木秋風難老舊河山孔賔好學非求隱元亮休官為愛間今古一株天上桂近來聞説有人攀隂蟲切切啼秋露涼月姢姢照夕風鸞鳯幾曽栖枳棘鴟梟多是占梧桐人皆酤酒追陶令我獨栽蓮學逺公堪笑當年槐國夢黃粱未熟巳成空次韻答人見寄野水晴山繞所居水聲山色共如如作詩不學前朝體揮翰多臨北海書塵暗古琴人聽少草深荒徑客來疏金蘭義重惟吾子長寄新吟到敝廬夜至市涇積慶寺蒹葭風髙寒氣深鴻雁叫渚日已沈青燈一點出林薄白屋幾家居水心野岸經霜楓未落村船入夜路難尋意行漸與精廬近耳畔俄聞有磬音客中次韻答平道士三首抱寂希夷二十年孤蹤隱約少人傳優遊泉石非徒爾玩弄文章是偶然槐市有時還縱步松窗無事且髙眠暫來江上尋詩友正值霜風落木天間房瀟灑樂堯年寄我新詩信可傳世上利名都索盡壺中日月更悠然風回髙樹吹瓢響露浥虛庭警鶴眠聞説仙壇朝斗夜簫聲殷殷下遙天聞君有道已多年籍籍聲名海內傳釋老門庭雖異趣山林風月本同然蓴香水國堪垂釣草暖陽坡可醉眠金錫也曽飛碧落不妨伴鶴上青天余留市涇積慶寺壁間有劉時中阻風之作因次其韻江郊嵗晚草樹黃原野拍塞浮晴光飛鴻冥冥楚山逺遊子窅窅吳天長柳並寺樓搖碧靄笛橫漁浦隔蒼茫如今海宇清寧久聲教雍容洽大荒東塔廣福寺步入松門一徑斜小橋南畔是田家講經老宿多遺骨聽法天仙不雨花倚漢危樓栖野鴿隔窗髙竹蛻秋蛇但令泉石堪依止包笠重來豈憚賖留别歸心難遣促歸期一夕霜風動渺瀰壟麥迎寒抽葉蚤江梅待雪放花遲登樓擬作懷鄉賦臨水還吟惜别詩明日松陵重回首碧雲紅樹總相思雨中次韻寶書鈔罷事清吟但覺虛窗景易沈階下亂泉空作響水邊嘉木自成隂雷聲殷殷雲頭黑風色蕭蕭雨意深不有同人逺存慰寂寥蹤迹更誰尋書山家壁植槿為籓竹作門翁姑長守主人墳野藤不共崖松老澗水自隨山路分溪上月明秋逼雨壁間燈暗夜生雲茫茫塵世無窮事終日蕭然竟不聞秋懷次韻虛庭獨坐晚涼生一道斜河屋外明幽鳥帶雲歸樹宿清鐘和月出樓鳴弟兄南北音書斷嵗序飄零客夢驚大雅髙風雖不競伊余時得會詩盟秋日雨中再用鉤字目送蒼旻無盡頭濕雲凝雨幾時收看山舊榻還當檻待月踈簾罷上鉤蚤稻損花秋失望髙梧翻葉夜生憂雞鳴狗吠豐年兆何日重聞某水丘次韻答人見寄憶昔江頭送别時歸舟欲上又還思百年塵事頻翻覆半世交遊幾合離天畔白雲惟舊色檻前青桂有新枝征鴻無限南來者不寄音書只寄詩悼芻長老苔色蒼蒼竹四圍山林雖是昔人非青春舊友有誰在白髮髙年空自歸禪榻塵昏孤磬咽影堂煙裊一燈微殷勤到此焚香罷獨對斜陽淚暗揮春日寺居答人見寄古寺栖遲甫嵗餘客氊未暖又移居修篁老盡猶遺種舊友亡來不寄書江郭雨寒聞雁少郊園春淺見花疏清香一炷琴三㺯終日蕭然掩敝廬京口車聲軋軋輾紅埃北馬南帆日夕來淮甸雪銷江水漲海門月上楚天開堤邊行飯多逢柳野外尋詩不見梅會散金山即歸去春風催我上琴臺上方孤塔巍峩出翠微湖光淡蕩照嵓扉綺羅香散遊人逺鼓笛聲消賽客稀故閣已傾餘柱礎斷碑空在長苔衣青山本是無今古幾度殘陽宿鳥歸書故人壁湘簾髙卷雨冥冥松竹蕭森滿户庭芳草春深隨意緑逺山雲盡向人青一川寒水橫疏牖數朵幽花插淨瓶回首利名驅逐者不知塵夢幾時醒遣懷境入中年萬事休但思韜迹老林丘西山夜雨寒侵夢南國春風雪滿頭桃李無私隨地發煙雲何意並人愁一雙窮相翻書手豈解尊前事獻酬次韻山村先生五首嚴陵臺下水潺湲漠漠髙風去不還處士隱廬遺路側永公書甕出松間山田墝瘠民生儉郡邑蕭條吏事間幾欲清遊身未遂煙霞盤礴鬢毛斑定起空山尚有星悲笳杳杳上青冥壁間燈暗雅啼樹池上月涼魚闖萍文錦薦柈風字研綵繩穿夾梵書經舌端解使天華隊爭似無言對翠屏尚無間手把茱萸豈得將身作醉扶留我香燈依澗壑聽人包笠繞江湖耽名冒貨爭蝸角要藝圖榮捋虎須松景滿忩秋日短楞嚴才罷巳申晡緑蘿深處澗聲幽一片間雲盡日留灰木身心都寂寂塵埃世事任悠悠壺中觀閣徒存想畫裏山川足卧遊若使杖藜能過此浮杯相伴狎輕鷗莫將學問負平生白石清泉暢野情槐國舊聞螻蟻戰鵲巢今見鵓鳩爭子胥尚昧遭吳廢文種寧思辟越亨更有卞和曽獻玉荆山月下淚盈盈漫成鄉來嵗月苦蹉跎今日生涯又若何交友漫多情少合間身未老鬢先皤水邊紅葉終難久天外青山豈易磨但得釣鼇竿子在短蓑輕笠傲煙波次韻無及長老蓬藋栖遲亦有年了無榮辱願誰憐道林解講猶騎馬魯望能詩却寄船苔壁晝深蟲吊寂紙窗秋破鳥窺禪焚香煮茗皆吾樂豈但清間便屬仙冬日書況寄無照香氷紙閣畫沈沈古鑑橫陳且照心喬木天寒風易急斷河雨竭水難深爐頭煮茗才中飯庭下觀梅已夕隂老大才踈倦馳騁漫書幽況寄知音以前詩寄無照見答稍遲輒自和促之此生誰暇計升沈但欲蕭間養淨心髙卧豈知浮世狹獨居惟覺故山深簷飛雪溜窗間濕日照空雲石面隂坐鄉西齋持密語近來能作五天音無照既見和復以元韻答之拂拭銅彛炷水沈跏趺相對可清心穿雲種玉青山逺破浪探珠碧海深滿樹春風傷渭北一篷夜雪憶山隂賡歌和曲非吾事聊演人間大雅音既酬之又用元韻遣興寄無照不鄉明時嘆陸沈敝廬堪隱莫年心蘭芳楚澤春愁闊月滿荆岑古恨深白首有名猶谷口青雲無夢自汾隂松風卧聽如韶濩膝上何勞緑綺音冬日作蒼松翠竹繞吾廬終日蕭然只晏如琴上不彈新曲譜篋中多貯故人書春生故苑梅開蚤雪滿寒江鴈過疏無限市朝車馬客豈知城郭有間居巳未嵗感事二首心攢百感鄉空書此日才同少水魚曠野有風傷晚稻荒園無雨減秋蔬東林泉石容髙道南嶽煙蘿尚獨居縱使聲華動京邑未知何地樂耕鋤野徑秋深葉滿苔豈堪塵迹此中來階前蟻陳衝還破花底蜂程挽莫回童子已提沽酒器山翁猶奉注茶杯長松怪石渾依舊相對何由笑口開遣懷三首堂堂嵗月水流東贏得身將稿木同草葉已零淹莫雨梅花才發值春風岐中厭作亡羊客塞上甘為失馬翁已有一枝栖倦翮翺翔何必羡𡨕鴻竟日何勞事苦吟漫因幽興寫間心神魚出海摶風逺玄豹依山隱霧深縣吏每來欣有酒鄰翁却去笑無金平生不畜間田地衣鉢隨緣直至今遁迹勿思澗壑間胥徒叫囂來扣關首陽尚使夷齊卧潁水寧容巢許間海上白鷗雖可狎雲中黃鵠却難攀何如穩泛華亭月莫學淮南賦小山除夕二首小閣春融坐不厭獨憐無月到松簷銅壺漏斷五更盡畫角聲銷一嵗添風燭冷光涵素壁瓶梅疏影透湘簾莫將爆竹驚山鬼近日城中火禁嚴春入江天夜坐溫嘉蔬喜得備盤飱笙歌不動還休市燈火雖張合閉門壟畝風寒傷薺麥山園地暖益蘭蓀近聞里弄兒童説明日庭中看水盆早春留别津亭煙暖柳絲輕欲上孤舟更問程野日照衣春色好江風吹面莫潮生遙山黯黯增羇思宿草離離動别情莫訝白雲無定在暫攜包笠去吳城春日至錢唐阻雨首寄山村先生客囱燈暗曙鐘殘泥潦從衡路未乾滿目雲山留我好一樓風雨見君難湖邉雪盡梅應蚤吳下春遲麥尚寒南渡耆英久寥落豈知猶有故衣冠登南髙峰絶頂客心江水兩悠悠髙閣間登見越州細嶺日斜樵子過斷崖壁立野泉流松根落石森兵衛天際孤舟片葉浮長嘯一聲羣響答又攜青竹下嵓幽過西湖霏微煙靄滿遙岑春入長堤栁色深今古畫船供一醉幾多紅粉得千金漁歌豈説遊人耳莫雨偏傷倦客心幸有孤山梅竹在杖藜徐步作幽尋清明日山行羣鳥聲喧春日晴家家插柳作清明溪雲落眼水邉坐花露沾衣樹底行野寺貧來猶換主山園廢後但存名都緣趣俗無新韻城郭幽栖過半生如鏡師剪竹四竿植為蒲桃架其一適活要余賦詩遂作此以塞請云蒼筤剪得出遙林架就危棚近壁隂柔蔓未垂珠落落短梢先挺碧沈沈月明亂影翻秋几露冷清聲入夜琴養取間門表孤直莫教容易俗塵侵子虛以湘竹杖惠余兼貺二詩遂依韻答之頒得山人古竹笻節間銷盡淚痕紅化龍定躍蒼波裏伴鶴還騰碧漢中蹞步安危存用舍百年前却付窮通相應海國歸來日繫向船頭取便風一枝誰剪楚山前却寄東吳遇客船打雨打風常在手挑雲挑月不離肩松根老石當秋倚花下幽蹊帶晚穿間處未容頭角露且留橫膝看青天漁父二首夕陽波上釣絲輕風入蒹葭窸窣鳴辭劔為憐逋客難鼓橈曽笑逐臣清數聲竹笛湘江闊一帽山花白髮明南北去來人自老幾多空抱羡魚情罷釣優遊老此身數椽茅屋並湖濵青雲富貴無多日白髮清間有幾人篷底未曽論伯越花間且莫問強秦紛紛世事皆如夢更送牀頭百甕春庚申嵗莫三首是非無定底須聽飽食遊談更不經髮短意長猶困學智生耄及漫勞形松濤衮衮翻茶鼎梅雪紛紛落瓦瓶門外數峯天削出亂暉東旭倚空青江郭隂寒天未晴嵗華拋擲又遐征蟄雷失序先春動野雉知時鄉曉鳴草木自堪同臭腐雪霜何必苦從衡謝公心雜陶公醉負却匡山白社盟強顔求舊情還異枉已攀緣藝必乖白雪豈傷侵紺髮黃埃唯恐涴青鞋倚松間看雲生石掩室幽聞葉墮階無用散材何所適布衣蔬食老巔涯經故人所居桃花灼灼柳依依院落荒涼晝掩扉石沼水乾魚逝久杏梁巢覆燕來稀壟頭未説人澆酒世上先傳客賣衣欲對東風寫離恨郡譙吹角莫雲飛天際歸舟圖天風低柳拂長堤舟入蒼茫逺景微炎暑有時銷客路灘聲終日在漁磯身隨江海馴鷗鷺夢落山林飽蕨薇從此束書歸舊隱晦名韜迹老巖扉秋思二首西風吹上洞庭波涼葉紛紛别故柯社燕畫簷秋影絶候蟲文砌夜聲多青藜扶起宜將老緑綺調成足倚歌城市往來今已久擬收孤迹寄煙蘿人生事事皆前定切莫猖狂欲妄行季子金多終富貴張儀舌在漫從衡柴桑雞狗還追放甫里煙波絶鬬爭楓葉已丹秋欲老水村隨處搗香粳辛酉嵗九日二首雲物凄涼秋意深江山何處可登臨一頭白髮驚風雨滿地黃花恨古今木葉暗隨鄰杵落草蟲寒並夜牀吟半生已分成樗散城郭長縣澗壑心九月江天絺綌涼眼看莎徑雨餘荒菊花不醉重陽酒柳葉還凋午夜霜席上未聞楓作虎山中誰信石為羊傷嗟杜老飄零久近亦歸來理草堂破窗落落疏櫺紙半無冒寒猶憶去年糊飛螢暗入侵衣亂涼月斜穿伴燭孤秋老蟲絲兼葉挂雨晴蝸殼帶苔枯候齋山鳥來還去幾畨相窺不受呼奉寄翰林趙學士二首孟俯玉堂學士晉清賢上國歸來雪滿顛畫妙未曽池畔作書工自得枕中傳溪山靜對堪娛老松鞠長存可引年見説有時因覔句醉扶鳩杖看鷗眠下馬趣班覲紫宸肌膚玉雪錦袍新北門視草稱三俊東閣揮毫第一人月隱掖垣分燭夜花迎御輦賜衣春文星肅望光芒正爛爛仍縣霅水濵過北塔有感次韻修廊徐步暗長吁古木猶存斧爨餘寒竈未聞煤墮甑空庖將見釡生魚香燈影斷經行少鐘鼓聲沈學者疏回首舊房拋已久草埋蕪沒任鳩居夜懷匡牀默坐夜燈明寥落霜天鴈一聲身世已成黃髮夢乾坤唯長白雲情綸竿獨老忘軒冕舟楫全生變姓名小大自來皆適性二蟲安得是同盟嵗晚書懷二首雨霰交飛嵗欲除間園草木已昭蘇盤登野菜無椒酒杯貯香粳有土酥禍福固應論塞馬雌雄何必辨城烏曳裾掃迹俱休問自爇黃連擁地爐天寒靜户少人過殖殖間庭爵可羅世上眼空蕉鹿夢車中聲斷飯牛歌泥融莎徑春風近潦沒蔬畦夜雨多清梵欲消江月上磬聲松韻冷相和除夕次韻無功屏迹丘阿每鮮歡老逢除夕恨漫漫生前聲利情偏淡身外經書興未闌狡兔漫垂三窟戀鷦鷯終寄一枝安百年浮世才炊頃推枕邯鄲夢巳殘落梅晴雪霏霏灑砌苔浪蜂欲去更徘徊空傳淡影浮歌扇不送寒香入酒杯隴首故人千里隔江南驛使幾時回翠禽莫怨髙樓笛一度春風幾度開柳寒條欲軟雨微微染作鵝黃學舞衣漢苑露濃宫葉重汴堤風暖岸花飛流鶯漫叫春還老酒斾空招客自歸若鄉津亭管離别爭如陶户靜相依雨中遣興雨橫風狂緑野隂孤城蚤覺已春深蒼松倚壑有寒操紅杏出牆無古心鄰館酒甘方擊甕客窗人靜罷彈琴華墳竺誥皆師友漫鄉間中作聽尋徐氏園池廣亭髙榭接遙鄰野雉籠藏錦翼新柳色上衣薌徑曉蜂聲浮席畫船春秋千自濕花間露鸂鷘還驚沼上人莫訝粉垣深掩護青山低處是紅塵代悼亡蓬閬思歸厭世樊青鸞緩引别朱門鏡中暫隱春風面花下終歸月夜魂簮珥獨留貽婢妾田園長守有兒孫紛紛弔客皆豪貴跪向棺前酹酒尊留别敬之講師麥擢蝦須春欲歸青山影裏欵山扉松風瑟瑟吹人面野日荒荒照客衣波上燕忙知夏近嵓間僧老出門稀明朝又振歸城錫清夢還應繞翠微秋日次韻二首息景城闉嵗月深見山還作采薇吟未曽世上期青眼獨鄉間中保素心鞠為花開登古缶蘭因香在守空林可人最是新栽竹鳯尾褵褷已及尋緇塵不到白雲深晝寂空聞木客吟柏子當香堪達信石頭聽法豈知心化牛鬬虎無杯渡放鶴沖霄有道林睥睨寒山舊詩卷上騰光焰數千尋秋夜懷古促織侵燈泣短莎夜深涼露下銀河井梧葉脫秋聲減江月煙銷霽色多千載悠悠遼鶴語三生渺渺牧兒歌豈知世上無窮事今古還應逐逝波趙子固所作蘭蕙圖王孫翰墨妙無倫寫出胸中萬古春蘭葉夢寒悲楚國蕙花香冷憶騷人紛紛蕭艾誰遺種落落山林自有鄰莫訝幽姿能岑寂石根終隔馬蹄塵春晚矮窗日月無今古閉户爭知春去來清鏡靜臨多白髮好花間看半蒼苔蛙傳鼓吹池塘雨茶展槍旗澗壑雷海燕未回寒尚在暮雲重疊鎖崔嵬寄𢎞道書記間愁不入酒杯中落魄江湖似轉蓬鶴髮歸來風月在錦心吐出語言工芭蕉葉大窗全緑芍藥花開砌半紅只尺林泉滯形迹對牀煎茗幾時同再用紅字答前人抱景亭亭澗壑中眼前多作倚麻蓬鷹鳩異質無非物枳橘皆名孰是工聲繞階除春雨暗光流几席夜燈紅詩筒莫厭勤來往草木爭知臭味同寫興三首翠霧沈沈雨乍收晚窗叢桂小山幽枕中孤夢通三世林下餘生寄一丘耄及犀顱便簡寂病侵鶴骨倦清遊明時但得身強健水曲巖阿足自由目中忽忽更童耄世上紛紛自盛衰張翰吏間歸去蚤季倫財散省來遲桃花浪急魚生子柳絮風柔燕領兒未必靈丹化頑頓擬將何物鑄鍾期不知名迹堪為纍蟻垤蜂房亦鬬強小黠大癡俱陸陸寸長尺短付茫茫米鹽胸府猶登坐鞍馬風流足撫觴案上簿書勤記録夜窗燒燭學研桑山中二首巖屋栖遲信有年豈同魚鳥樂天淵身間尚不耽間味地靜何嘗住靜緣林下晝營燒筍火石間時引煮茶泉菜畦香燼青煙散月滿松頭鶴未眠萬事無求心便安莫論人世道塗難風聲繞樹夜將半月色到窗燈未殘峭壁倚天蒼蘚古斷崖飛瀑白雲寒飢餐困卧隨緣過趼足何勞作野盤春晚二首窗中雨霽見遙岑拂羽鳴鳩送好音我懶未能參俗事詩工自足醉人心掃階喜擁青松鬛對客慵彈緑玉琴一枕江南三月夢桃花結子柳成隂丘壑由來迹可逃豈容塵土涴雲袍石鼎湯浮寒蟹眼陶杯文刷秋兔毫林塘瀰瀰白水滿山館亭亭青樹髙得句未能書雪繭屐齒欲折心忘勞苦雨積潦橫流路不分滿空煙靄暗朝昏烏鳶跕跕墮荒圃風雨瀟瀟失逺村芻米賈騰愁白屋管絃聲沸醉朱門無言桃李參差放似怯春寒欲斷魂春搜圖酸風射眼路迢遙斜跨銀鞍度渭橋野外翻身捎徑匙雲間灑血落盤雕犬循荒磧威偏壯獸困重圍力易消什伍相將歸細柳亨羶釃酒醉春宵讀宗鏡録珍閟龍龕幾百年我生何幸得披研真空境寂非文字妙有緣生立聖賢權實圓明般若智果因清淨涅槃天殊宗異學求源委拭目方知萃此編癸亥嵗寓錢唐千頃寺述懷髙閣工書三十年藝成媒禍少人憐猖狂得意既由命坎壈纒身莫問天半夜飛蚊消廣夏一天涼雨潤髙田雖然老朽成羈絆還在山邊與水邊秋夕井閭鳴雨夜漫漫語靜長廊燭未殘月色浸窗花漏迥蛬聲浮席竹房寒世情竟作秋雲薄禮數渾如野水寬彈鋏掃門非我事委身嵓谷自盤桓書鮮于伯機詩後兼用其韻昭時丹鳯雊崇岡吐出神珠埒夜光眼見箋麻才只尺耳聞名姓幾星霜北山水石增吟興南蕩絃歌助酒狂千載不須嗟寂寞已留遺墨遍炎方登虎阜再用伯機韻髙標孑孑插雲岡深殿孤燈葆寂光巖畔野芳初帶露樹頭山實未經霜滄溟自引浮杯興佳節還羞落帽狂小艇不知歸路晚到城新月挂金方秋山圖淅淅涼風動泬寥白雲紅樹擁岹嶢扁舟倚岸不知久拄杖穿林頓覺遙樓閣蔽虧橫逺漢澗溪舂激度危橋沃洲自合支公住曼倩從教隱市朝贈楊秀才江城已作黃花晚澗壑方驚白髮秋樗散幾年拋寂寞憐君此日肯相求雲霄直上饒騎鶴湖海同盟願狎鷗老我未忘千里志杖藜終約看淮流冬日寄無功黃鞠當階爛漫開小窗紅葉自成堆天寒但解冰霜至人老爭知嵗月催萬事不求真富貴一毫為纍即塵埃風流來往唯吾子擬共巡簷看蚤梅癸亥嵗莫書懷白雲深處掩茆茨回首人間萬事遺愚知得時皆有命古今造物本無私阮公漫解開青眼墨子終須泣素絲臘盡雪銷梅放後寂寥寒谷是春姿遣興五首五十雖賖病見侵閉門終日少相尋春鶯漫逞千般語老驥終存萬里心花繞竹房紅作陳柳垂莎徑翠成隂江南三月清明後便有蛙聲聒夜深博山煙靄作空濛脈脈幽馨鼻觀通一院杏花寒食雨數聲黃鳥緑楊風忙中日月何曽異靜裏乾坤自不同蟲臂鼠肝隨所化未能勞力問崆洞身前萬事若浮塵過眼從衡日日新蛙黽得時多意氣鯤鯨失水少精神青山古木丘園晚白鳥蒼煙浦溆春回首吳淞興無限鴨頭新漲緑粼粼天運循環杳莫窮生生化化古來同一百六日寒食雨二十四畨花信風此身不寄鵲巢內孤迹聊藏人海中深院日長新睡足倚闌間數北歸鴻千載誰言柳花香醉李吐出錦繡腸江邊春雨一犂足天外晴絲百尺長空山無人薇蕨長流水落花鶯燕忙自來貴賤皆歸盡草木衰榮豈足傷寄白雲反關銷景湖水眉吾子政是安瞑時春寒未成筍蕨夢老大得赴煙霞期松湍潄壑青燈迥篆縷縈簾白日遲清磬數聲經卷罷風前洗耳貫休詩追和宋馬雲訪踞湖山仇隱君韻白雲飛盡碧山空屋外夭桃破曉紅幽塢樹深難隔世平湖水闊易生風丹光射斗驚朝士酒氣薰林引釣翁未識鳯書何日下隼旟今已到嵓叢過友人所居春紅銷盡緑隂繁簾幕風輕燕子還柳絮漲天清晝永蛙聲動地白雲間亭亭巨筆林間塔隱隱修眉郭外山不是君家有泉石杖藜那得事躋攀次韻答彥上人城郭幽栖鬢欲衰豈堪煙浪隔相知鴻歸絶漠疏來信鵲噪虛簷辱寄詩黃葛暑煩還御蚤蒲葵晝寂獨揮遲雖然兩地同明月跛足何由得望之光福寺用唐顧在容韻浮圖突兀倚雲中頂冠神珠爍太空地接近村分野緑天縣落日隔溪紅穹堂廣坐涼銷夏絶壁髙山夜吼風齋鉢久虛龍象散上方留得住山翁甲子嵗莫時序川流齒漸增此身還顧百無能心縣絳闕耽名客夢繞蒼山賞靜僧古樹月明深巷雨逺天鴻過矮窗燈平生漫有煙波興擬宿蘆花尚未曽虎丘用唐李紳韻闔閭丘墓名空在代逺時殊事不同碑碣尚無唐故迹山林寧有晉遺風剎幡影動青冥外齋鼓聲消莽蒼中若使石頭曽聽法豈能終日並禪宫代悼亡清鏡孤鸞曉影沈但傷兒女百年心華堂遺像有時見瑤席慈容無路尋夜半窗紗明月照架頭巾帨素塵侵數莖白骨歸黃壤回首人間隔古今贈艾幼清教授庭暉故鄉拋擲寓東吳客館凄涼尚讀書縣令棄官猶有酒先生寄食豈無魚江城春老花飛急槐市風清燕過初草木想當名已熟往來多識馬相如無照林亭纍土崇丘作小亭手栽花木滿林坰郡中髙樹巳全緑屋外逺山才半青過眼榮枯荒圃草到頭聚散野池萍餘生但願身長健杖䇿時來對翠屏自陽山歸舟中作小麥青青大麥黃澗松風急夜聲長轎穿細路春泥滑花落清渠野水香嶺上獨留雲作蓋村邉多見石為梁楓橋寺轉閶門近回首西山已夕陽偶讀中峯和尚和瀋王王璋留題真際亭詩因而有感遂次其韻二首衆峯序列作愁顔鶴怨猿驚尚未間月滿蘿庵人寂寞風生松嶺澗潺湲王因問道來天上師為逃名去世間獨撫遺編成浩歎水雲無路扣玄關西峯泉石可怡顔地逺塵蹤日月間樓觀耽耽橫嵽嵲杉松矗矗蔽潺湲安危豈在羊腸裏寵辱偏生馬足間自是名王尊有道間攜賔從及柴關贈叔恭負笈擔簦計已灰歸來蕭寺掩莓苔呼猿别澗曽拋果放鶴它山得看梅樵徑雪晴芒屩出江橋風熟布帆開反思身外無窮事不直窗間水一杯新居次韻山村先生天地茫茫喜定居莫年應是惜三餘青燈不作前朝夢白首猶觀後世書遼海舊傳千嵗鶴謝池今見九洲魚清風朗月皆疇侣鬻茗焚香足晏如曉作次韻前人東旭朝隮萬象明新鴻嘹嚦度江城寒花獨對情偏淡鄰杵幽聞韻更清荒徑草衰秋欲老逺山雲盡雨初晴半生已作溝中斷潦倒終非待晚成漫興二首栖遲久已傍嵓隈駒隟光隂自暗催江國夜寒楓葉落楚天霜冷塞鴻來清遊振䇿尋花塢野望褰衣上石臺堪笑人間未歸客摩挲銅狄欲興哀平生無夢到槐安鏡裏青春鬢已乾霜氣稜稜摧衆草光風漠漠泛崇蘭塵埃世事隨時變淡泊交情到處難幾度呼童課經罷看雲默默倚危闌淮隂侯羣雄逐鹿競紛紛虎鬬龍爭藝未分背楚棄官皆失義下齊求國是要君蒯通詭辨誠難信陳豨上姦謀豈易論當日更無鍾室嘆豈勝竹帛載元勳舟中西出胥門路不賖短篷回首已天涯髙林鵲噪青山近逺岸人行白日斜幡影浮空標野寺耞聲隱谷隔田家十年來往成何事贏得蕭蕭兩鬢華吳嶺道中山村人過犬吠竇野澗魚躍泉鳴沙江城雨雪三春莫嵓屋松杉滿地花芳草路邉逢廢井夕陽川上見歸雅年年寒食偏傷感能上新墳有幾家垂虹亭長虹夭蟜卧平湖奕奕新亭畫不如簷切太空喧燕爵影搖寒水蔭龜魚它山雨過漁歸久别浦潮回月上初今日豈無題柱客會應來此駐軒車讀時太初海昌詩卷旅宦迢遙滄海濵熬波終日役疲民夜窗夢覺驚風雨寒燭吟殘動鬼神覽鏡每傷新白髮把杯還憶舊青春空餘翰墨傳天壤老我林間失故人畫梅曽向孤村見此枝杖藜徐步雪晴時香飄野路傳春早影上山窗礙月遲處士詩存猶可讀逃禪骨朽却難追芬芬瓊蕊無今古羌笛髙樓亦漫吹秋思梧桐百尺金井髙秋風吹葉聲蕭騷莊生是非付一指杜老飄零嗟二毛月明江上雁飛急木落窗間人夢勞非熊自起磻溪釣淮南小山方遁逃楊尖觀音院壁間有故御史周公景逺留題一再讀之令人短氣遂用其韻為詩悼之以寓平生交契之意拂塵讀罷思悠然詞翰空存逐逝川銀管修文歸地下玉棺承詔墮天邊聊城丘壟木未拱蕭寺鶯花春政妍欲致生芻惜無路漫歌風雨度年年論詩是非不到白雲中髙卧冥冥碧漢鴻典雅始成唐句法麁豪終有宋人風智愚願作登壇將茅土偏旌蓋代功狂妄末流徒好惡豈知到海味還同山中寂寥空谷久相容行道何須向别峯山腹引泉同煮茗嶺頭乘雨為栽松倚天傑閣巢靈鶴徹海澄潭卧毒龍樵客豈能知住處草堂終日白雲封寄無功雨雪霏霏嵗暮天路泥活活古城煙出門曳杕難相就矯首停雲恨莫前瞑色半窗書引睡屐聲盈耳客驚眠巳聞處處添新漲早晚春湖共放船懷安養詩獨立天涯送落暉故鄉拋擲淚沾衣久知慈父嗟逃逝早辦誠心好賦歸三界竛竮真可吊四生流浪竟何依白毫今古無私照攝引西馳願不違谷響集卷二
